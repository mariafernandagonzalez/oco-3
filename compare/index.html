<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OCO-3 CO&#x2082; City Explorer</title>
<style>
:root{
  --bg:#050505;--bg2:#080808;--bg3:#111;
  --b1:#181818;--b2:#222;--b3:#333;
  --t1:#f2f2f2;--t2:#bbb;--t3:#777;
  --accent:#00f5ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--t1);font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:13px}
body{display:flex}

/* ── Sidebar ─────────────────────────────────────────────── */
.sb{width:248px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden}
.sb.dragging{user-select:none}
.sb.slim .sb-head p,.sb.slim .sb-lbl-hint,.sb.slim .back-lnk{display:none}
.sb.slim .sb-sec,.sb.slim .sb-head,.sb.slim .sb-foot{padding-left:10px;padding-right:10px}
.sb.slim .city-item{gap:5px}
.sb.slim .ci-country,.sb.slim .ci-co2{display:none}
.sb.slim .ci-name{font-size:10px}
.sb-resizer{
  width:8px;flex-shrink:0;cursor:ew-resize;position:relative;
  margin-left:-8px;z-index:20;
  background:linear-gradient(to right, rgba(24,24,24,1), rgba(8,8,8,.2));
}
.sb-resizer::after{
  content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:2px;height:38px;border-radius:2px;background:#2a2a2a;
}
.sb-resizer:hover::after{background:#3a3a3a}
.sb-head{padding:14px 16px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sb-head h1{font-size:12px;font-weight:700;color:#fff;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.sb-head p{font-size:9px;color:var(--t3);letter-spacing:.08em}
/* City list */
.city-list{overflow-y:auto;max-height:260px;margin-top:6px}
.city-list::-webkit-scrollbar{width:3px}
.city-list::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}
.city-item{display:flex;align-items:center;gap:8px;padding:5px 4px 5px 2px;
  border-radius:3px;cursor:pointer;transition:background .1s;user-select:none}
.city-item:hover{background:#111}
.city-item.sel{background:#0b1520}
.ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid #333;transition:all .15s}
.ci-text{flex:1;min-width:0}
.ci-name{font-size:11px;color:var(--t2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-item.sel .ci-name{font-weight:600}
.ci-country{font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-co2{font-size:9px;color:#555;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums}
.city-list-empty{font-size:10px;color:var(--t3);padding:8px 4px;text-align:center}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px}
.sb-sec{padding:10px 16px 9px;border-bottom:1px solid #0c0c0c}
.sb-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.sb-lbl-hint{font-size:8px;color:#2a2a2a;text-transform:none;letter-spacing:.04em}
.chips{display:flex;flex-wrap:wrap;gap:4px;min-height:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 6px 3px 8px;
  border-radius:20px;border:1px solid;font-size:10px;cursor:default;user-select:none;
  white-space:nowrap;max-width:120px}
.chip span{overflow:hidden;text-overflow:ellipsis}
.chip-x{opacity:.5;cursor:pointer;font-size:10px;padding:0 1px;flex-shrink:0}
.chip-x:hover{opacity:1}
.sb-search-wrap{margin-top:8px;position:relative}
.sb-inp{width:100%;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);
  padding:5px 9px;font-size:11px;border-radius:4px;outline:none;font-family:inherit}
.sb-inp::placeholder{color:#333}
.sb-inp:focus{border-color:var(--b3)}
.ac{position:absolute;left:0;right:0;top:calc(100% + 2px);background:var(--bg3);
  border:1px solid var(--b2);border-radius:4px;max-height:154px;overflow-y:auto;z-index:200;display:none}
.ac.open{display:block}
.ac-it{padding:5px 10px;font-size:11px;cursor:pointer;color:var(--t2)}
.ac-it:hover{background:var(--b1);color:var(--t1)}
.ac-it.nm{color:var(--t3);cursor:default}
.yr-row{display:flex;align-items:center;gap:6px}
.yr-sel{flex:1;background:var(--bg3);border:1px solid var(--b2);color:var(--t1);
  padding:4px 6px;font-size:11px;border-radius:3px;outline:none;cursor:pointer;font-family:inherit}
.yr-sel:focus{border-color:var(--b3)}
.yr-dash{color:var(--t3);font-size:11px;flex-shrink:0}
.months-hint{font-size:9px;color:var(--t3);margin-top:5px}
.view-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.vb{padding:5px 0;background:var(--bg3);border:1px solid var(--b2);color:var(--t3);
  border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px;text-align:center;
  letter-spacing:.04em;transition:all .12s}
.vb:hover{color:var(--t2);border-color:var(--b3)}
.vb.on{color:var(--accent);border-color:var(--accent)44;background:#061518}
.sb-foot{padding:10px 16px 14px;border-top:1px solid var(--b1);flex-shrink:0;margin-top:auto}
.ts-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;
  background:#091209;border:1px solid #142014;border-radius:5px;text-decoration:none;
  color:#39ff14;font-size:11px;letter-spacing:.04em;margin-bottom:8px;transition:background .14s}
.ts-btn:hover{background:#0c1a0c}
.ts-btn-arr{font-size:17px;animation:bob .85s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.back-lnk{font-size:9px;color:#252525;text-decoration:none;display:block;text-align:center}
.back-lnk:hover{color:var(--t3)}

/* ── Stage ───────────────────────────────────────────────── */
.stage{flex:1;position:relative;overflow:hidden;background:var(--bg);cursor:default}
#cv{position:absolute;inset:0;width:100%;height:100%;cursor:grab;transition:opacity .18s}
#cv:active{cursor:grabbing}
#cv.fade{opacity:.25}

/* Tooltip */
#tt{position:absolute;pointer-events:none;z-index:50;display:none;
  background:#0a0a0a;border:1px solid var(--b3);border-radius:6px;
  padding:8px 12px;font-size:11px;max-width:200px;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.8)}
.tt-name{font-weight:600;color:#fff;margin-bottom:3px}
.tt-row{color:var(--t2);line-height:1.7}
.tt-row b{color:var(--t1)}

/* Nav arrows */
.nav{position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;background:rgba(6,6,6,.85);border:1px solid var(--b2);
  border-radius:50%;color:var(--t3);font-size:14px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav:hover{color:var(--t1);border-color:var(--b3)}
.nav.l{left:9px}
.nav.r{right:9px}

/* View dots */
.dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;z-index:10}
.dot{width:5px;height:5px;border-radius:50%;background:#1a1a1a;cursor:pointer;transition:background,box-shadow .14s}
.dot.on{background:var(--accent);box-shadow:0 0 8px rgba(0,245,255,.45)}

/* View header bar */
#vhdr{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;text-align:center}
#vhdr h2{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.9)}
#vhdr p{font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.05em}

/* Globe toggle */
#gtog{position:absolute;top:10px;right:11px;z-index:10;font-size:10px;padding:4px 9px;
  background:var(--bg3);border:1px solid var(--b2);color:var(--t3);border-radius:3px;
  cursor:pointer;font-family:inherit;letter-spacing:.05em;text-transform:uppercase;transition:all .12s}
#gtog:hover{color:var(--t1)}
#gtog.flat{color:var(--accent);border-color:var(--accent)44}

/* Scatter controls */
#scat-ctrl{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  z-index:10;display:none;align-items:center;gap:8px;
  background:rgba(8,8,8,.9);border:1px solid #1e1e1e;border-radius:5px;
  padding:5px 12px;white-space:nowrap}
#scat-ctrl.on{display:flex}
.sc-lbl{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.1em}
.sc-sep{color:#252525;font-size:12px}
.sc-sel{background:#0d0d0d;border:1px solid #222;color:#ccc;padding:3px 5px;
  font-size:10px;border-radius:3px;outline:none;cursor:pointer;font-family:inherit;
  max-width:160px}
.sc-col-block{display:inline-flex;align-items:center;gap:8px}

/* Pulse link overlay */
#plink{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:10;
  display:none;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:#39ff14}
#plink:hover{opacity:.8}
#plink .pl-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase}
#plink .pl-arr{font-size:22px;animation:bob .85s ease-in-out infinite}

/* Loading */
#ldg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;color:#1e1e1e;pointer-events:none;z-index:5}
.ldg-sp{width:20px;height:20px;border:2px solid #141414;border-top-color:#2e2e2e;
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<aside class="sb">
  <div class="sb-head">
    <h1>CO&#x2082; City Explorer</h1>
    <p>OCO-3 SAM &#xb7; Ahn et al. 2025 supplementary</p>
  </div>
  <div class="sb-scroll">
    <div class="sb-sec">
      <div class="sb-lbl">Selected <span class="sb-lbl-hint" id="sel-count"></span></div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="sb-sec" style="flex:1;display:flex;flex-direction:column;border-bottom:none">
      <div class="sb-lbl">All Cities <span class="sb-lbl-hint">click to toggle</span></div>
      <input class="sb-inp" id="srch" type="text" placeholder="Filter cities&#x2026;" autocomplete="off" style="margin-bottom:2px">
      <div class="city-list" id="city-list"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Time Range</div>
      <div class="yr-row">
        <select class="yr-sel" id="yfrom"></select>
        <span class="yr-dash">&#x2014;</span>
        <select class="yr-sel" id="yto"></select>
      </div>
      <div class="months-hint" id="mhint"></div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Analysis View</div>
      <div class="view-grid" id="vgrid"></div>
    </div>
  </div>
  <div class="sb-foot">
    <a class="ts-btn" href="../timeseries/index.html">
      <span class="ts-btn-arr">&#x21e9;</span>
      <span>Full Timeseries Explorer</span>
    </a>
    <a class="back-lnk" href="../index.html">&#x2190; back to home</a>
  </div>
</aside>
<div class="sb-resizer" id="sb-resizer" title="Drag to resize sidebar"></div>

<div class="stage" id="stage">
  <canvas id="cv"></canvas>
  <div id="ldg"><div class="ldg-sp"></div><span>Loading world map&#x2026;</span></div>
  <div id="tt">
    <div class="tt-name" id="tt-name"></div>
    <div id="tt-body"></div>
  </div>
  <div id="vhdr"></div>
  <button class="nav l" id="np">&#x2190;</button>
  <button class="nav r" id="nn">&#x2192;</button>
  <div class="dots" id="dots"></div>
  <button id="gtog">&#x26F6; 2D Map</button>
  <div id="scat-ctrl">
    <span class="sc-lbl">X</span>
    <select class="sc-sel" id="sc-x">
      <option value="xco2avg">Mean XCO&#x2082; (ppm)</option>
      <option value="sif">Mean SIF (W/m²/sr/nm)</option>
      <option value="gdppc">GDP per capita (USD/person)</option>
      <option value="gdp">GDP (billion USD)</option>
      <option value="pop">Population (millions)</option>
      <option value="co2emit">CO&#x2082; Emissions (MtCO&#x2082;/yr)</option>
      <option value="co2gdp">CO&#x2082;/GDP (kgCO&#x2082;/USD)</option>
    </select>
    <span class="sc-sep">&#x2014;</span>
    <span class="sc-lbl">Y</span>
    <select class="sc-sel" id="sc-y">
      <option value="sif">Mean SIF (W/m²/sr/nm)</option>
      <option value="xco2avg">Mean XCO&#x2082; (ppm)</option>
      <option value="co2gdp">CO&#x2082;/GDP (kgCO&#x2082;/USD)</option>
      <option value="co2emit">CO&#x2082; Emissions (MtCO&#x2082;/yr)</option>
      <option value="gdppc">GDP per capita (USD/person)</option>
      <option value="gdp">GDP (billion USD)</option>
      <option value="pop">Population (millions)</option>
    </select>
    <span class="sc-sep">&#x2014;</span>
    <span class="sc-lbl">Size</span>
    <select class="sc-sel" id="sc-sz">
      <option value="pop">Population</option>
      <option value="co2emit">Emissions</option>
      <option value="gdp">GDP</option>
      <option value="uniform">Uniform</option>
    </select>
    <span class="sc-col-block" id="sc-col-block">
      <span class="sc-sep">&#x2014;</span>
      <span class="sc-lbl">Color</span>
      <select class="sc-sel" id="sc-col">
        <option value="xco2avg">XCO&#x2082;</option>
        <option value="sif">SIF</option>
        <option value="pop">Population</option>
        <option value="co2emit">Emissions</option>
      </select>
    </span>
  </div>
  <a id="plink" href="../timeseries/index.html">
    <span class="pl-lbl">Open in Timeseries Explorer</span>
    <span class="pl-arr">&#x21e9;</span>
  </a>
</div>

<script src="lib/d3.min.js"></script>
<script src="lib/topojson.min.js"></script>

function setupSidebarResize(){
  if(!sb||!sbResizer) return;
  const MIN_SB=0;
  const MAX_SB=460;
  const SLIM_SB=128;
  let startX=0,startW=0,dragging=false;

  function applySidebarWidth(w){
    const clamped=Math.max(MIN_SB,Math.min(MAX_SB,w));
    sb.style.width=clamped+"px";
    sb.classList.toggle("slim",clamped<SLIM_SB);
  }

  sbResizer.addEventListener("pointerdown",(e)=>{
    dragging=true;
    startX=e.clientX;
    startW=sb.getBoundingClientRect().width;
    sb.classList.add("dragging");
    sbResizer.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  sbResizer.addEventListener("pointermove",(e)=>{
    if(!dragging) return;
    applySidebarWidth(startW+(e.clientX-startX));
    resize();
  });

  function stopDrag(e){
    if(!dragging) return;
    dragging=false;
    sb.classList.remove("dragging");
    if(e&&sbResizer.hasPointerCapture(e.pointerId)) sbResizer.releasePointerCapture(e.pointerId);
  }

  sbResizer.addEventListener("pointerup",stopDrag);
  sbResizer.addEventListener("pointercancel",stopDrag);
}

function resize(){
  const st=document.getElementById("stage");
  W=st.clientWidth; H=st.clientHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  render();
}

function scatVal(c,key,months){

  if(key==='sif') return getSIF(c.name, months);
  if(key==='gdp')    return c.gdp    != null ? c.gdp    : null;

// ── SIF (Solar-Induced Fluorescence) ─────────────────────────────
// Primary: real OCO-3 SIF data from sif_sam.csv (SIF_MONTHLY)
// Fallback: latitude-based seasonal simulation when data unavailable
function _sifSim(lat,ym){
  const mo=parseInt(ym.split("-")[1]);
  const al=Math.abs(lat);
  const base=0.12+0.28*Math.exp(-al/38);
  const amp=0.16*(1-Math.exp(-al/22));
  const pk=lat>=0?7:1;
  return Math.max(0,base+amp*Math.sin(TAU*(mo-pk)/12));
}
// getSIF(name, months) — returns mean real SIF over given months (W/m²/sr/nm)
// months: array of "YYYY-MM" strings from filtMo()
function getSIF(name, months){
  const mo=SIF_MONTHLY[name];
  if(mo){
    const keys=months&&months.length?months.filter(m=>mo[m]!==undefined):Object.keys(mo);
    if(keys.length) return keys.reduce((s,m)=>s+(mo[m]||0),0)/keys.length;
  }
  // Fallback simulation using city lat
  const c=CITY_DATA.find(x=>x.name===name);
  const lat=c?c.lat:0;
  if(!months||!months.length){let s=0;for(let m=1;m<=12;m++)s+=_sifSim(lat,"2022-"+String(m).padStart(2,"0"));return s/12;}
  return months.reduce((s,m)=>s+_sifSim(lat,m),0)/months.length;
}
// Legacy alias kept for any remaining call sites (passes lat but ignores it in favor of name lookup)
function meanSIF(lat,months,name){
  if(name) return getSIF(name,months);
  // pure simulation path (no city name available)
  if(!months||!months.length){let s=0;for(let m=1;m<=12;m++)s+=_sifSim(lat,"2022-"+String(m).padStart(2,"0"));return s/12;}
  return months.reduce((s,m)=>s+_sifSim(lat,m),0)/months.length;
}
function ha(hex,a){

}

// True when a lon/lat point is on the visible (front) hemisphere
// of an orthographic globe projection.
function isFrontHemisphere(proj,lon,lat){
  if(!proj||!proj.rotate) return true;

// ── SPACE STARS (visual backdrop around globes) ───────────────────
function drawSpaceStars(cx,cy,R){
  // Deterministic pseudo-random star field around each globe
  const n=180;
  const t=Date.now()*0.0015;
  ctx.save();
  // keep stars near globe region, but not over the sphere itself
  ctx.beginPath();
  ctx.rect(cx-R*1.95,cy-R*1.95,R*3.9,R*3.9);
  ctx.arc(cx,cy,R*1.01,0,TAU,true);
  ctx.clip("evenodd");
  for(let i=0;i<n;i++){
    const a=((i*137.50776405)%360)*Math.PI/180; // golden-angle spread
    const rf=1.08+((Math.sin(i*12.9898)*43758.5453)%1+1)%1*.9; // 1.08..1.98
    const r=R*rf;
    const x=cx+Math.cos(a)*r;
    const y=cy+Math.sin(a)*r;
    const sz=((Math.sin(i*78.233)*1531.17)%1+1)%1;
    const tw=.55+.45*Math.sin(t+i*.33);
    const rad=sz>.82?1.35:sz>.52?.95:.62;
    const alp=sz>.82?.72:sz>.52?.48:.30;
    // cool-white stars with slight blue tint
    ctx.fillStyle=`rgba(${210+Math.round(35*tw)},${220+Math.round(25*tw)},255,${alp})`;
    ctx.beginPath(); ctx.arc(x,y,rad,0,TAU); ctx.fill();
    // occasional tiny glow
    if(sz>.9){
      const g=ctx.createRadialGradient(x,y,0,x,y,rad*3.2);
      g.addColorStop(0,`rgba(185,215,255,${alp*.28})`);
      g.addColorStop(1,"rgba(185,215,255,0)");
      ctx.beginPath(); ctx.arc(x,y,rad*3.2,0,TAU); ctx.fillStyle=g; ctx.fill();
    }
  }
  ctx.restore();
}

// Full-stage starfield used in Pulse mode
function drawStageStars(){
  // Stratified grid sampling keeps star density visually uniform
  const cols=30, rows=16;
  const n=cols*rows;
  const t=Date.now()*0.0014;
  ctx.save();
  for(let gy=0;gy<rows;gy++){
    for(let gx=0;gx<cols;gx++){
      const i=gy*cols+gx;
      // jitter inside each cell (deterministic)
      const jx=((Math.sin(i*91.713)*43758.5453)%1+1)%1;
      const jy=((Math.sin((i+17)*53.127)*24634.6345)%1+1)%1;
      const x=(gx+(jx*.82+.09))/cols*W;
      const y=(gy+(jy*.82+.09))/rows*H;
      const sz=((Math.sin(i*12.9898)*1531.17)%1+1)%1;
      const tw=.55+.45*Math.sin(t+i*.41);
      const rad=sz>.88?1.4:sz>.55?1.0:.62;
      const alp=sz>.88?.82:sz>.55?.52:.28;
      ctx.fillStyle=`rgba(${205+Math.round(40*tw)},${220+Math.round(25*tw)},255,${alp})`;
      ctx.beginPath(); ctx.arc(x,y,rad,0,TAU); ctx.fill();
      if(sz>.93){
        const g=ctx.createRadialGradient(x,y,0,x,y,rad*3.4);
        g.addColorStop(0,`rgba(185,215,255,${alp*.34})`);
        g.addColorStop(1,"rgba(185,215,255,0)");
        ctx.beginPath(); ctx.arc(x,y,rad*3.4,0,TAU); ctx.fillStyle=g; ctx.fill();
      }
    }
  }
  ctx.restore();
}

// ── BASE GLOBE DRAWING ────────────────────────────────────────────
function drawGlobe(proj,opts={}){
  const{alpha=1,light=true,stars=true}=opts;
  const path=d3.geoPath(proj,ctx);
  const[cx,cy]=proj.translate();
  const R=proj.scale();
  ctx.save(); ctx.globalAlpha=alpha;

  // Star backdrop around the globe (optional; disable in Pulse to keep uniform density)
  if(stars) drawSpaceStars(cx,cy,R);

  // Light source direction: upper-left of globe
  const lx=cx-R*.42, ly=cy-R*.38;

  // ── 1. Outer atmosphere glow (behind sphere) ─────────────────
  const atmoOut=ctx.createRadialGradient(cx,cy,R*.8,cx,cy,R*1.25);
  atmoOut.addColorStop(0,"rgba(20,80,200,0)");
  atmoOut.addColorStop(0.35,"rgba(40,120,255,0.30)");
  atmoOut.addColorStop(1,"rgba(10,40,140,0)");
  ctx.beginPath(); ctx.arc(cx,cy,R*1.25,0,TAU);
  ctx.fillStyle=atmoOut; ctx.fill();

  // ── 2. Base sphere (deep ocean) ───────────────────────────────
  ctx.beginPath(); path({type:"Sphere"});
  ctx.fillStyle="#05101e"; ctx.fill();

  // ── 3. Ocean depth: strong limb-darkening for convex 3-D look ─
  const depthGrd=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  depthGrd.addColorStop(0,  "rgba(30,70,140,0.18)");
  depthGrd.addColorStop(0.5,"rgba(0,0,0,0)");
  depthGrd.addColorStop(0.82,"rgba(0,0,0,0.28)");
  depthGrd.addColorStop(1,  "rgba(0,0,0,0.72)");
  ctx.beginPath(); path({type:"Sphere"});
  ctx.fillStyle=depthGrd; ctx.fill();

  if(light){
    // ── 4. Directional diffuse light on ocean ──────────────────
    const diffGrd=ctx.createRadialGradient(lx,ly,0,cx,cy,R*1.1);
    diffGrd.addColorStop(0,  "rgba(100,165,255,0.28)");
    diffGrd.addColorStop(0.3,"rgba(65,130,240,0.14)");
    diffGrd.addColorStop(0.6,"rgba(0,0,0,0)");
    diffGrd.addColorStop(1,  "rgba(0,0,0,0)");
    ctx.beginPath(); path({type:"Sphere"});
    ctx.fillStyle=diffGrd; ctx.fill();

    // ── 5. Terminator shadow – heavy dark crescent ─────────────
    // Two-stop shadow: transparent in lit zone → very dark at far edge
    const sx=cx+R*.38, sy=cy+R*.34;
    const shadGrd=ctx.createRadialGradient(lx,ly,R*.55,cx+R*.18,cy+R*.16,R*1.05);
    shadGrd.addColorStop(0,  "rgba(0,0,0,0)");
    shadGrd.addColorStop(0.55,"rgba(0,0,0,0.18)");
    shadGrd.addColorStop(0.82,"rgba(0,0,0,0.52)");
    shadGrd.addColorStop(1,  "rgba(0,0,0,0.80)");
    ctx.beginPath(); path({type:"Sphere"});
    ctx.fillStyle=shadGrd; ctx.fill();
  }

  // ── 6. Graticules (over ocean shading, under land) ────────────
  const gratMinor=d3.geoGraticule().step([15,15])();
  ctx.beginPath(); path(gratMinor);
  ctx.strokeStyle="rgba(25,55,115,0.26)"; ctx.lineWidth=.35; ctx.stroke();
  const gratMajor=d3.geoGraticule().step([30,30])();
  ctx.beginPath(); path(gratMajor);
  ctx.strokeStyle="rgba(95,145,230,0.45)"; ctx.lineWidth=.7; ctx.stroke();

  // ── 7. Land – drawn LAST so it always sits on top of shading ──
  if(land){
    ctx.beginPath(); path(land);
    ctx.fillStyle="#16284a"; ctx.fill();   // brighter than ocean base
  }
  // ── 8. Country borders ────────────────────────────────────────
  if(countries){
    ctx.beginPath(); path(countries);
    ctx.strokeStyle="rgba(70,130,230,0.65)"; ctx.lineWidth=.6; ctx.stroke();
  }

  if(light){
    // ── 9. Specular highlight (glossy spot near light source) ──
    const specGrd=ctx.createRadialGradient(lx,ly,0,lx,ly,R*.6);
    specGrd.addColorStop(0,  "rgba(220,238,255,0.38)");
    specGrd.addColorStop(0.18,"rgba(180,215,255,0.18)");
    specGrd.addColorStop(0.45,"rgba(80,150,255,0.06)");
    specGrd.addColorStop(1,  "rgba(0,0,0,0)");
    ctx.beginPath(); path({type:"Sphere"});
    ctx.fillStyle=specGrd; ctx.fill();

    // ── 10. Atmosphere limb glow (thin blue ring at edge) ──────
    const limbGrd=ctx.createRadialGradient(cx,cy,R*.72,cx,cy,R);
    limbGrd.addColorStop(0,  "rgba(0,0,0,0)");
    limbGrd.addColorStop(0.6,"rgba(30,80,210,0)");
    limbGrd.addColorStop(1,  "rgba(55,140,255,0.60)");
    ctx.beginPath(); path({type:"Sphere"});
    ctx.fillStyle=limbGrd; ctx.fill();
  }

  // ── 11. Rim stroke ────────────────────────────────────────────
  ctx.beginPath(); path({type:"Sphere"});
  ctx.strokeStyle="rgba(65,140,255,0.55)"; ctx.lineWidth=1.8; ctx.stroke();

  // ── 12. Major lat/lon labels ──────────────────────────────────
  drawGlobeLatLonLabels(proj);

  ctx.restore();
}
function drawFlatMap(proj){
  const path=d3.geoPath(proj,ctx);

// Mean XCO2 anomaly above global background
function xco2Dev(name){
  const st=cityStats(name); return st?Math.max(0,st.avg-413):0;
}
// SIF color scale: white (low) → bright mid-green → #022110 (high)
// Input: SIF value in W/m²/sr/nm; returns CSS color string
function sifColor(v){
  const t=Math.max(0,Math.min(1,v/0.45));
  // Piecewise ramp:
  // 0.00: white         (255,255,255)
  // 0.58: bright green  (118,255,170)
  // 1.00: deep green    (  2, 33, 16)
  let r,g,b;
  if(t<0.58){
    const u=t/0.58;
    r=Math.round(255+(118-255)*u);
    g=Math.round(255+(255-255)*u);
    b=Math.round(255+(170-255)*u);
  }else{
    const u=(t-0.58)/0.42;
    r=Math.round(118+(2-118)*u);
    g=Math.round(255+(33-255)*u);
    b=Math.round(170+(16-170)*u);
  }
  return`rgb(${r},${g},${b})`;
}
function sifColorAlpha(v,a){
  const t=Math.max(0,Math.min(1,v/0.45));
  let r,g,b;
  if(t<0.58){
    const u=t/0.58;
    r=Math.round(255+(118-255)*u);
    g=Math.round(255+(255-255)*u);
    b=Math.round(255+(170-255)*u);
  }else{
    const u=(t-0.58)/0.42;
    r=Math.round(118+(2-118)*u);
    g=Math.round(255+(33-255)*u);
    b=Math.round(170+(16-170)*u);
  }
  return`rgba(${r},${g},${b},${a})`;
}
// CO2 color scale: white (low) → dark red (high)
function co2Color01(t){
  t=Math.max(0,Math.min(1,t));
  // white (255,255,255) -> bright red mid -> dark red (88,0,0)
  let r,g,b;
  if(t<0.55){
    const u=t/0.55;
    // white -> bright red
    r=Math.round(255+(255-255)*u);
    g=Math.round(255+(62-255)*u);
    b=Math.round(255+(62-255)*u);
  }else{
    const u=(t-0.55)/0.45;
    // bright red -> dark red
    r=Math.round(255+(88-255)*u);
    g=Math.round(62+(0-62)*u);
    b=Math.round(62+(0-62)*u);
  }
  return`rgb(${r},${g},${b})`;
}
// Signed CO2 difference scale: -1 (dark blue) -> 0 (white) -> +1 (dark red)
function co2DiffColorSigned(t){
  t=Math.max(-1,Math.min(1,t));
  let r,g,b;
  if(t<0){
    const u=t+1; // -1..0 -> 0..1
    // dark blue (18,42,125) -> white
    r=Math.round(18+(255-18)*u);
    g=Math.round(42+(255-42)*u);
    b=Math.round(125+(255-125)*u);
  }else{
    const u=t; // 0..1
    // white -> dark red (130,16,16)
    r=Math.round(255+(130-255)*u);
    g=Math.round(255+(16-255)*u);
    b=Math.round(255+(16-255)*u);
  }
  return`rgb(${r},${g},${b})`;
}
// Signed SIF difference scale: -1 (dark purple) -> 0 (white) -> +1 (dark green)
function sifDiffColorSigned(t){
  t=Math.max(-1,Math.min(1,t));
  let r,g,b;
  if(t<0){
    const u=t+1; // -1..0
    // dark purple (84,22,115) -> white
    r=Math.round(84+(255-84)*u);
    g=Math.round(22+(255-22)*u);
    b=Math.round(115+(255-115)*u);
  }else{
    const u=t; // 0..1
    // white -> dark green (8,92,34)
    r=Math.round(255+(8-255)*u);
    g=Math.round(255+(92-255)*u);
    b=Math.round(255+(34-255)*u);
  }
  return`rgb(${r},${g},${b})`;
}

function drawDots(proj,opts={}){
  const{selR=6,dimR=1.5,labels=true,sizeByXco2=false}=opts;
  const mo=S.month; // null = avg, "YYYY-MM" = specific month
  // For sizing selected cities: use deviation from global mean for that month, or avg deviation
  const selXco2s=S.sel.map(n=>{
    if(mo){const v=(CO2_MONTHLY[n]||{})[mo]; return v!=null?Math.abs(v-420):0;}
    return xco2Dev(n);
  });
  const maxDev=Math.max(...selXco2s,1);

  // Background cities
  for(const c of CITY_DATA){
    if(S.sel.includes(c.name)) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const isHov=S.hover===c.name;
    if(sizeByXco2){
      // Color by SIF for current month or avg
      const sv=mo
        ?((SIF_MONTHLY[c.name]||{})[mo]??_sifSim(c.lat,mo))
        :getSIF(c.name,filtMo(c.name));
      ctx.beginPath(); ctx.arc(p[0],p[1],isHov?5:2.2,0,TAU);
      ctx.fillStyle=isHov?sifColor(sv):sifColorAlpha(sv,0.55); ctx.fill();
    } else {
      const hasMo=mo?(CO2_MONTHLY[c.name]||{})[mo]!=null:filtMo(c.name).length>0;
      ctx.beginPath(); ctx.arc(p[0],p[1],isHov?4.5:dimR,0,TAU);
      ctx.fillStyle=isHov?"rgba(200,220,255,0.65)":hasMo?"rgba(50,95,180,0.35)":"rgba(35,60,110,0.18)";
      ctx.fill();
    }
    if(isHov){
      ctx.font="10px Segoe UI,sans-serif"; ctx.fillStyle="rgba(200,220,255,0.8)";
      ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(c.name,p[0]+7,p[1]);
    }
  }
  // Selected cities on top
  for(const name of S.sel){
    const c=CITY_DATA.find(x=>x.name===name); if(!c) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const col=S.colors[name];
    const dev=mo?((CO2_MONTHLY[name]||{})[mo]!=null?Math.abs((CO2_MONTHLY[name]||{})[mo]-420):0):xco2Dev(name);
    const r=sizeByXco2?8+26*(dev/maxDev):selR;
    const sv=mo
      ?((SIF_MONTHLY[name]||{})[mo]??_sifSim(c.lat,mo))
      :getSIF(name,filtMo(name));
    const glowOuter=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],r*3.1);
    glowOuter.addColorStop(0,ha(col,.20)); glowOuter.addColorStop(.45,ha(col,.08)); glowOuter.addColorStop(1,ha(col,0));
    ctx.beginPath(); ctx.arc(p[0],p[1],r*3.1,0,TAU); ctx.fillStyle=glowOuter; ctx.fill();
    const glowInner=ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],r*1.45);
    glowInner.addColorStop(0,ha(col,.22)); glowInner.addColorStop(1,ha(col,0));
    ctx.beginPath(); ctx.arc(p[0],p[1],r*1.45,0,TAU); ctx.fillStyle=glowInner; ctx.fill();
    ctx.beginPath(); ctx.arc(p[0],p[1],r,0,TAU);
    ctx.fillStyle=sizeByXco2?sifColorAlpha(sv,.85):col; ctx.fill();
    if(sizeByXco2){ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();}
    else {ctx.strokeStyle=ha(col,.95); ctx.lineWidth=1.4; ctx.stroke();}
    if(labels&&!sizeByXco2){
      ctx.font="bold 10.5px Segoe UI,sans-serif";
      ctx.fillStyle=col; ctx.textAlign="left"; ctx.textBaseline="middle";
      ctx.fillText(c.name.split(" ")[0],p[0]+r+4,p[1]);
    }
    if(sizeByXco2){
      const co2val=mo?(CO2_MONTHLY[name]||{})[mo]:cityStats(name)?.avg;
      ctx.font="bold 11.5px Segoe UI,sans-serif"; ctx.fillStyle=col;
      ctx.textAlign="center"; ctx.textBaseline="top";
      ctx.fillText(name,p[0],p[1]+r+5);
      ctx.font="10px Segoe UI,sans-serif"; ctx.fillStyle="rgba(200,200,200,0.7)";
      const xcoLbl=co2val!=null?co2val.toFixed(1)+" ppm":"";
      const sifLbl="SIF "+sv.toFixed(2);
      ctx.fillText(xcoLbl,p[0],p[1]+r+17);
      ctx.fillStyle=sifColorAlpha(sv,0.9);
      ctx.fillText(sifLbl,p[0],p[1]+r+28);
    }
  }
}

// ── MINIMAP ───────────────────────────────────────────────────────
function drawMinimap(alpha=0.85){
  const mw=170,mh=85,mx=W-mw-10,my=10;
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle="#060c18"; ctx.strokeStyle="#18283e"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.rect(mx,my,mw,mh); ctx.fill(); ctx.stroke();
  const proj=mkEq(mx+mw/2,my+mh/2,mw/6.6);
  const path=d3.geoPath(proj,ctx);
  if(land){ctx.beginPath();path(land);ctx.fillStyle="#0f1e34";ctx.fill();}
  if(countries){ctx.beginPath();path(countries);ctx.strokeStyle="rgba(45,90,170,0.45)";ctx.lineWidth=.4;ctx.stroke();}
  for(const c of CITY_DATA){
    const p=proj([c.lon,c.lat]); if(!p) continue;
    if(p[0]<mx||p[0]>mx+mw||p[1]<my||p[1]>my+mh) continue;
    const isSel=S.sel.includes(c.name);
    ctx.beginPath(); ctx.arc(p[0],p[1],isSel?3:1,0,TAU);
    ctx.fillStyle=isSel?S.colors[c.name]:"rgba(45,75,135,0.45)"; ctx.fill();
  }
  ctx.restore();
}

// ── MONTH SCRUBBER (V0 / V1) ─────────────────────────────────────
// Draws a scrubber strip at the bottom of the canvas showing all months.
// Drag/click to set S.month. Click active month to clear (show averages).
const SCR={drag:false, y0:0, h:20}; // geometry cached each frame
function drawScrubber(){
  const months=getAllMonths();
  const M=months.length;
  if(!M) return;
  const pad=10, sY=H-SCR.h-4, sW=W-pad*2;
  SCR.y0=sY; SCR.x0=pad; SCR.w=sW;
  const xOf=j=>pad+j/(M-1)*sW;
  SCR.xOf=xOf; SCR.months=months;

  // Background track
  ctx.fillStyle="rgba(0,0,0,.6)";
  ctx.beginPath(); ctx.roundRect(pad-2,sY-2,sW+4,SCR.h+4,4); ctx.fill();

  // Month segments — colored by whether in current year filter
  months.forEach((m,j)=>{
    const yr=+m.slice(0,4);
    const inRange=yr>=S.yfrom&&yr<=S.yto;
    const isCur=m===S.month;
    const x=xOf(j);
    ctx.fillStyle=isCur?"#00f5ff":inRange?"rgba(0,180,220,0.28)":"rgba(60,60,60,0.3)";
    ctx.fillRect(x-1,sY+2,2,SCR.h-4);
  });
  // Blackout overlay for storage period
  months.forEach((m,j)=>{
    if(!isBlackoutMonth(m)) return;
    const x=xOf(j);
    ctx.fillStyle="rgba(0,0,0,.92)";
    ctx.fillRect(x-1,sY+2,2,SCR.h-4);
  });

  // Year tick labels
  YEARS.forEach(y=>{
    const firstMo=months.find(m=>m.startsWith(y+"-"));
    if(!firstMo) return;
    const x=xOf(months.indexOf(firstMo));
    ctx.fillStyle="#333"; ctx.fillRect(x-.4,sY,1,SCR.h);
    ctx.fillStyle="#555"; ctx.font="8px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText(y,x,sY-10);
  });

  // Active month playhead
  if(S.month){
    const j=months.indexOf(S.month);
    if(j>=0){
      const x=xOf(j);
      ctx.fillStyle="#00f5ff";
      ctx.beginPath(); ctx.roundRect(x-4,sY-1,8,SCR.h+2,2); ctx.fill();
      ctx.fillStyle="#000"; ctx.font="bold 8px Segoe UI,sans-serif";
      ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText(S.month,x,sY-12);
    }
  } else {
    // "avg" label
    ctx.fillStyle="#444"; ctx.font="8px Segoe UI,sans-serif";
    ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText("Drag to scrub \u2192 showing avg",pad,sY-2);
  }
}

function scrubberHit(ex,ey){
  if(S.view>1||!SCR.months) return false;
  const rect=cv.getBoundingClientRect();
  const my=ey-rect.top;
  return my>=SCR.y0-8&&my<=SCR.y0+SCR.h+8;
}
function scrubToX(ex){
  const rect=cv.getBoundingClientRect();
  const mx=ex-rect.left;
  const M=SCR.months.length;
  const j=Math.max(0,Math.min(M-1,Math.round((mx-SCR.x0)/SCR.w*(M-1))));
  const m=SCR.months[j];
  if(m===S.month){S.month=null;}else{S.month=m;}
  render();
}

// ── VIEW 0: Globe / Map ───────────────────────────────────────────
function drawV0(){
  ctx.clearRect(0,0,W,H);
  const sc=Math.min(W,H)*.4;
  if(!S.flat){
    const proj=mkGlobe(W/2,H/2,sc);
    drawGlobe(proj,{stars:false});
    drawDots(proj,{selR:7});
    drawMinimap();
  } else {
    const proj=mkFlat(W/2,H/2,W/6.6);
    drawFlatMap(proj);
    drawDots(proj,{selR:7});
    drawMinimap();
  }
  ctx.save();
  ctx.fillStyle="rgba(5,5,5,.8)"; ctx.fillRect(12,12,224,18);
  ctx.fillStyle="#666"; ctx.font="9px Segoe UI,sans-serif";
  ctx.textBaseline="middle"; ctx.textAlign="left";
  ctx.fillText(CITY_DATA.length+" cities \u00b7 OCO-3 SAM \u00b7 click to select",18,22);
  ctx.restore();
  drawScrubber();
}

// ── VIEW 1: Comparison Bubbles ────────────────────────────────────
function drawV1(){
  ctx.clearRect(0,0,W,H);
  const sc=Math.min(W,H)*.4;
  const proj=S.flat?mkFlat(W/2,H/2,W/6.6):mkGlobe(W/2,H/2,sc);
  if(S.flat) drawFlatMap(proj); else drawGlobe(proj,{stars:false});
  // Dim all non-selected
  for(const c of CITY_DATA){
    if(S.sel.includes(c.name)) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    ctx.beginPath(); ctx.arc(p[0],p[1],1.5,0,TAU);
    ctx.fillStyle="rgba(35,60,110,0.2)"; ctx.fill();
  }
  drawDots(proj,{sizeByXco2:true,labels:false});
  drawMinimap(.7);

  // ── Legend ──
  ctx.save();
  const lx=14, ly=H-130;
  const LW=210, LH=126;
  ctx.fillStyle="rgba(4,4,6,.82)";
  ctx.strokeStyle="#1a1a1a"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(lx-2,ly-4,LW,LH,4); ctx.fill(); ctx.stroke();

  // Title
  ctx.fillStyle="#aaa"; ctx.font="bold 8.5px Segoe UI,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("ENCODING",lx+2,ly+2);

  // ── Size legend (XCO2) ──
  ctx.fillStyle="#777"; ctx.font="8px Segoe UI,sans-serif";
  ctx.fillText("Bubble size  \u2192  Mean XCO\u2082 (ppm)",lx+4,ly+16);
  const selDevs=S.sel.map(n=>xco2Dev(n));
  const maxDev=Math.max(...selDevs,1);
  [.2,.55,1].forEach((f,k)=>{
    const r=Math.round(8+26*f);
    const bx=lx+18+k*62, by=ly+42;
    ctx.beginPath(); ctx.arc(bx,by,r,0,TAU);
    ctx.strokeStyle="#555"; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle="#666"; ctx.textAlign="center"; ctx.textBaseline="top"; ctx.font="8px Segoe UI,sans-serif";
    ctx.fillText((413+f*maxDev).toFixed(1),bx,by+r+2);
  });

  // ── SIF color ramp ──
  ctx.fillStyle="#777"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText("Fill color  \u2192  SIF (W/m\u00b2/sr/nm, OCO-3)",lx+4,ly+70);
  // Draw gradient bar
  const barX=lx+4, barY=ly+83, barW=LW-16, barH=11;
  for(let i=0;i<barW;i++){
    ctx.fillStyle=sifColor(i/barW*0.45);
    ctx.fillRect(barX+i,barY,1,barH);
  }
  ctx.strokeStyle="#333"; ctx.lineWidth=.6; ctx.strokeRect(barX,barY,barW,barH);
  // Labels under bar
  ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif";
  ctx.textAlign="left";  ctx.textBaseline="top"; ctx.fillText("0",barX,barY+barH+2);
  ctx.textAlign="right"; ctx.fillText("0.45+ W/m\u00b2/sr/nm",barX+barW,barY+barH+2);

  // Ring color = city ID note
  ctx.fillStyle="#555"; ctx.font="7.5px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText("Ring color = city identity",lx+4,ly+LH-12);
  ctx.restore();

  // Active month badge
  if(S.month){
    ctx.fillStyle="rgba(0,0,0,.75)";
    ctx.beginPath(); ctx.roundRect(W/2-52,14,104,22,4); ctx.fill();
    ctx.fillStyle="#00f5ff"; ctx.font="bold 12px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(S.month,W/2,25);
  }
  drawScrubber();
}

// ── VIEW 2: Pulse / Interleaved ───────────────────────────────────
function drawV2(){
  ctx.clearRect(0,0,W,H);
  if(!S.sel.length){noDataMsg("Select cities to see the pulse view");return;}
  const n=S.sel.length;
  const gR=Math.min(W*.145,H*.19);
  const gCX=W*.21, gCY1=H*.28, gCY2=H*.72;
  const sc=S.sel.map(nm=>CITY_DATA.find(c=>c.name===nm)).filter(Boolean);
  const cLon=sc.length?sc.reduce((s,c)=>s+c.lon,0)/sc.length:0;
  const cLat=sc.length?sc.reduce((s,c)=>s+c.lat,0)/sc.length:0;
  if(!S.pulseRot) S.pulseRot={lon:cLon,lat:cLat};
  const pr=S.pulseRot;
  const projF=mkGlobe(gCX,gCY1,gR,pr.lon,pr.lat);
  const projB=mkGlobe(gCX,gCY2,gR,(pr.lon+180)%360,-pr.lat);
  drawGlobe(projF,{light:false,stars:false});
  drawGlobe(projB,{light:false,stars:false});

  S._pulseGeom={front:{cx:gCX,cy:gCY1,r:gR,proj:projF},back:{cx:gCX,cy:gCY2,r:gR,proj:projB}};

  for(const c of CITY_DATA){
    const visF=isFrontHemisphere(projF,c.lon,c.lat);
    const visB=isFrontHemisphere(projB,c.lon,c.lat);
    const p1=visF?projF([c.lon,c.lat]):null;
    const p2=visB?projB([c.lon,c.lat]):null;
    if(p1){ctx.beginPath();ctx.arc(p1[0],p1[1],1.25,0,TAU);ctx.fillStyle="rgba(35,65,125,0.24)";ctx.fill();}
    if(p2){ctx.beginPath();ctx.arc(p2[0],p2[1],1.25,0,TAU);ctx.fillStyle="rgba(35,65,125,0.24)";ctx.fill();}
  }
  ctx.fillStyle="rgba(165,190,235,0.72)";
  ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom";
  ctx.fillText("FRONT",gCX,gCY1-gR-6);
  ctx.fillText("BACK",gCX,gCY2-gR-6);

  const spX0=W*.41, spX1=W*.94, spW=spX1-spX0;
  S._v2tlTog=null;

  // In-view mode toggle: Pulse <-> Timeline (combined tab behavior)
  const tW=154,tH=24,tX=W- tW - 14,tY=12;
  S._v2tog={x:tX,y:tY,w:tW,h:tH};
  ctx.fillStyle="rgba(7,9,13,.92)";
  ctx.strokeStyle="#1f2839"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(tX,tY,tW,tH,4); ctx.fill(); ctx.stroke();
  const leftOn=S.v2mode==='pulse';
  ctx.fillStyle=leftOn?"rgba(0,245,255,.13)":"rgba(0,0,0,0)";
  ctx.beginPath(); ctx.roundRect(tX+2,tY+2,tW/2-3,tH-4,3); ctx.fill();
  ctx.fillStyle=!leftOn?"rgba(0,245,255,.13)":"rgba(0,0,0,0)";
  ctx.beginPath(); ctx.roundRect(tX+tW/2+1,tY+2,tW/2-3,tH-4,3); ctx.fill();
  ctx.fillStyle=leftOn?"#9ffcff":"#6f7f97"; ctx.font="10px Segoe UI,sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("Pulse",tX+tW*.25,tY+tH/2);
  ctx.fillStyle=!leftOn?"#9ffcff":"#6f7f97";
  ctx.fillText("Timeline",tX+tW*.75,tY+tH/2);

  if(S.v2mode==='timeline'){
    // Keep dual globes on left, but use timeline matrix on right
    const n2=S.sel.length;
    const labW=124,legH=56,topPad=52;
    const allMoSet2=new Set();
    S.sel.forEach(nm=>filtMo(nm).forEach(m=>allMoSet2.add(m)));
    const months=Array.from(allMoSet2).sort();
    if(!months.length){noDataMsg("No data in selected time range");return;}
    const M=months.length;
    const cellW=Math.max(9,Math.min(30,(W-spX0-labW-24)/M));
    const totW=cellW*M;
    const startX=spX0+labW+(W-spX0-labW-24-totW)/2;
    const meanSecH=30;
    const rowsTop=topPad+meanSecH+6;
    const plotH=H-legH-rowsTop;
    const rowH2=plotH/(n2+.5);
    const bandGap=2;
    const bandH=Math.max(5,Math.min(12,rowH2*.32));

    // Toggle for timeline metric mode (raw values vs difference from mean)
    const t2W=204,t2H=22,t2X=tX-t2W-8,t2Y=tY+1;
    S._v2tlTog={x:t2X,y:t2Y,w:t2W,h:t2H};
    const rawOn=S.v2timelineMetric==='raw';
    ctx.fillStyle="rgba(7,9,13,.92)";
    ctx.strokeStyle="#1f2839"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(t2X,t2Y,t2W,t2H,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle=rawOn?"rgba(0,245,255,.13)":"rgba(0,0,0,0)";
    ctx.beginPath(); ctx.roundRect(t2X+2,t2Y+2,t2W/2-3,t2H-4,3); ctx.fill();
    ctx.fillStyle=!rawOn?"rgba(0,245,255,.13)":"rgba(0,0,0,0)";
    ctx.beginPath(); ctx.roundRect(t2X+t2W/2+1,t2Y+2,t2W/2-3,t2H-4,3); ctx.fill();
    ctx.fillStyle=rawOn?"#9ffcff":"#6f7f97"; ctx.font="9px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("City Values",t2X+t2W*.25,t2Y+t2H/2);
    ctx.fillStyle=!rawOn?"#9ffcff":"#6f7f97";
    ctx.fillText("Difference vs Mean",t2X+t2W*.75,t2Y+t2H/2);

    // Monthly means across selected cities
    const meanCo2={},meanSif={};
    months.forEach(m=>{
      const cv=S.sel.map(nm=>(CO2_MONTHLY[nm]||{})[m]).filter(v=>v!=null);
      const sv=S.sel.map(nm=>{
        const c=CITY_DATA.find(x=>x.name===nm);
        if(!c) return null;
        const sm=SIF_MONTHLY[c.name]||{};
        return sm[m]!=null?sm[m]:_sifSim(c.lat,m);
      }).filter(v=>v!=null);
      if(cv.length) meanCo2[m]=cv.reduce((a,b)=>a+b,0)/cv.length;
      if(sv.length) meanSif[m]=sv.reduce((a,b)=>a+b,0)/sv.length;
    });
    const meanVals=Object.values(meanCo2);
    const meanMin=meanVals.length?Math.min(...meanVals):410;
    const meanMax=meanVals.length?Math.max(...meanVals):430;
    const meanRng=Math.max(.6,meanMax-meanMin);

    // For anomaly mode, normalize by max absolute deviation
    let maxCo2Diff=0,maxSifDiff=0;
    if(S.v2timelineMetric==='anomaly'){
      S.sel.forEach(name=>{
        const c=CITY_DATA.find(x=>x.name===name); if(!c) return;
        const mo=CO2_MONTHLY[name]||{};
        const sm=SIF_MONTHLY[c.name]||{};
        months.forEach(m=>{
          const v=mo[m];
          if(v!=null&&meanCo2[m]!=null) maxCo2Diff=Math.max(maxCo2Diff,Math.abs(v-meanCo2[m]));
          const sv=sm[m]!=null?sm[m]:_sifSim(c.lat,m);
          if(meanSif[m]!=null) maxSifDiff=Math.max(maxSifDiff,Math.abs(sv-meanSif[m]));
        });
      });
      maxCo2Diff=Math.max(maxCo2Diff,.05);
      maxSifDiff=Math.max(maxSifDiff,.01);
    }

    const yBkt={};
    months.forEach((m,i)=>{const y=m.slice(0,4);if(!yBkt[y])yBkt[y]=[];yBkt[y].push(i);});
    ctx.save();
    ctx.fillStyle="#666"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
    Object.entries(yBkt).forEach(([yr,idxs])=>{
      const mi=(idxs[0]+idxs[idxs.length-1])/2;
      ctx.fillText(yr,startX+mi*cellW+cellW/2,rowsTop-14);
      if(idxs[0]>0){
        ctx.strokeStyle="#111";ctx.lineWidth=.6;
        ctx.beginPath();ctx.moveTo(startX+idxs[0]*cellW,rowsTop-2);ctx.lineTo(startX+idxs[0]*cellW,rowsTop+plotH-legH+12);ctx.stroke();
      }
    });

    // Mean section at top (per month)
    const mY0=topPad, mBandH=11;
    ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle";
    ctx.fillStyle="rgba(150,160,180,.75)";
    ctx.fillText("Mean CO2",startX-6,mY0+mBandH/2);
    ctx.fillText("Mean SIF",startX-6,mY0+mBandH+1+mBandH/2);
    months.forEach((m,j)=>{
      const x=startX+j*cellW;
      const mc=meanCo2[m], ms=meanSif[m];
      const ct=mc==null?0:Math.max(0,Math.min(1,(mc-meanMin)/meanRng));
      ctx.fillStyle=mc==null?"rgba(24,24,24,.65)":co2Color01(ct);
      ctx.fillRect(x,mY0,Math.max(1,cellW-1),mBandH);
      const st=ms==null?0:Math.max(0,Math.min(1,ms/.45));
      ctx.fillStyle=ms==null?"rgba(24,24,24,.65)":sifColor(st*0.45);
      ctx.fillRect(x,mY0+mBandH+1,Math.max(1,cellW-1),mBandH);
      if(isBlackoutMonth(m)){
        ctx.fillStyle="rgba(0,0,0,.92)";
        ctx.fillRect(x,mY0,Math.max(1,cellW-1),mBandH);
        ctx.fillRect(x,mY0+mBandH+1,Math.max(1,cellW-1),mBandH);
      }
    });
    ctx.strokeStyle="rgba(40,40,40,.6)"; ctx.lineWidth=.6;
    ctx.strokeRect(startX,mY0,totW,mBandH);
    ctx.strokeRect(startX,mY0+mBandH+1,totW,mBandH);

    S.sel.forEach((name,i)=>{
      const c=CITY_DATA.find(x=>x.name===name); if(!c) return;
      const col=S.colors[name];
      const rowY=rowsTop+rowH2*(i+.62);
      const yCO2=rowY-bandH*.58-bandGap*.5;
      const ySIF=rowY+bandGap*.5;
      const cpF=isFrontHemisphere(projF,c.lon,c.lat)?projF([c.lon,c.lat]):null;
      const cpB=isFrontHemisphere(projB,c.lon,c.lat)?projB([c.lon,c.lat]):null;
      const cp=cpF||cpB;
      const sX=cp?cp[0]:gCX+gR*1.1, sY=cp?cp[1]:rowY;
      const anchorX=spX0+labW-2;
      const midX=(sX+anchorX)/2;
      // Connector from visible globe side to this city's timeline row
      ctx.beginPath(); ctx.moveTo(sX,sY);
      ctx.bezierCurveTo(midX+46,sY,midX-36,rowY,anchorX,rowY);
      ctx.strokeStyle=ha(col,.36); ctx.lineWidth=1; ctx.stroke();
      if(cpF){ctx.beginPath();ctx.arc(cpF[0],cpF[1],4.2,0,TAU);ctx.fillStyle=col;ctx.fill();}
      if(cpB){ctx.beginPath();ctx.arc(cpB[0],cpB[1],4.2,0,TAU);ctx.fillStyle=col;ctx.fill();}
      const mo=CO2_MONTHLY[name]||{};
      ctx.font="bold 11px Segoe UI,sans-serif"; ctx.fillStyle=col;
      ctx.textAlign="right"; ctx.textBaseline="middle";
      ctx.fillText(name.length>15?name.slice(0,14)+"…":name,spX0+labW-9,rowY);
      ctx.font="8px Segoe UI,sans-serif"; ctx.fillStyle="#888";
      ctx.fillText(c.country.split(" ").pop(),spX0+labW-9,rowY+13);

      // Row backgrounds for the two stacked bands
      ctx.fillStyle="rgba(18,18,18,.42)";
      ctx.fillRect(startX,yCO2,totW,bandH);
      ctx.fillRect(startX,ySIF,totW,bandH);
      ctx.strokeStyle="rgba(40,40,40,.6)"; ctx.lineWidth=.6;
      ctx.strokeRect(startX,yCO2,totW,bandH);
      ctx.strokeRect(startX,ySIF,totW,bandH);

      // Per-row scales
      const stats=cityStats(name)||{min:410,max:425};
      const co2Min=stats.min, co2Max=Math.max(stats.max,stats.min+.6);
      const co2Rng=Math.max(co2Max-co2Min,.6);
      const sifMoAll=SIF_MONTHLY[c.name]||{};
      let sfMin=Infinity,sfMax=-Infinity;
      months.forEach(m=>{
        const sv=sifMoAll[m]!=null?sifMoAll[m]:_sifSim(c.lat,m);
        sfMin=Math.min(sfMin,sv); sfMax=Math.max(sfMax,sv);
      });
      if(!isFinite(sfMin)||!isFinite(sfMax)){sfMin=0;sfMax=.45;}
      const sfRng=Math.max(sfMax-sfMin,.05);

      months.forEach((m,j)=>{
        const x=startX+j*cellW;
        const val=mo[m];
        const sv=sifMoAll[m]!=null?sifMoAll[m]:_sifSim(c.lat,m);
        if(S.v2timelineMetric==='raw'){
          // CO2 top band: white -> red (per-city scale)
          if(val!==undefined){
            const ct=Math.max(0,Math.min(1,(val-co2Min)/co2Rng));
            ctx.fillStyle=co2Color01(ct);
            ctx.fillRect(x,yCO2,Math.max(1,cellW-1),bandH);
          }else{
            ctx.fillStyle="rgba(24,24,24,.65)";
            ctx.fillRect(x,yCO2,Math.max(1,cellW-1),bandH);
          }
          // SIF bottom band: white -> green (per-city scale)
          const st=Math.max(0,Math.min(1,(sv-sfMin)/sfRng));
          ctx.fillStyle=sifColor(st*0.45);
          ctx.fillRect(x,ySIF,Math.max(1,cellW-1),bandH);
        }else{
          // Difference mode: signed deviation from monthly mean
          if(val!==undefined&&meanCo2[m]!=null){
            const ct=Math.max(-1,Math.min(1,(val-meanCo2[m])/maxCo2Diff));
            ctx.fillStyle=co2DiffColorSigned(ct);
            ctx.fillRect(x,yCO2,Math.max(1,cellW-1),bandH);
          }else{
            ctx.fillStyle="rgba(24,24,24,.65)";
            ctx.fillRect(x,yCO2,Math.max(1,cellW-1),bandH);
          }
          if(meanSif[m]!=null){
            const st=Math.max(-1,Math.min(1,(sv-meanSif[m])/maxSifDiff));
            ctx.fillStyle=sifDiffColorSigned(st);
            ctx.fillRect(x,ySIF,Math.max(1,cellW-1),bandH);
          }else{
            ctx.fillStyle="rgba(24,24,24,.65)";
            ctx.fillRect(x,ySIF,Math.max(1,cellW-1),bandH);
          }
        }
        if(isBlackoutMonth(m)){
          ctx.fillStyle="rgba(0,0,0,.92)";
          ctx.fillRect(x,yCO2,Math.max(1,cellW-1),bandH);
          ctx.fillRect(x,ySIF,Math.max(1,cellW-1),bandH);
        }
      });

      // Labels "CO2" and "SIF" at left of each band's row
      ctx.font="7px Segoe UI,sans-serif"; ctx.fillStyle="rgba(140,150,170,.75)";
      ctx.textAlign="right"; ctx.textBaseline="middle";
      ctx.fillText("CO2",startX-4,yCO2+bandH/2);
      ctx.fillText("SIF",startX-4,ySIF+bandH/2);
    });
    ctx.fillStyle="#111"; ctx.fillRect(spX0+labW,H-legH,W-(spX0+labW),legH);
    ctx.fillStyle="#aaa"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
    const lg=S.v2timelineMetric==='raw'
      ?"TOP BAND = CO2 (white -> red, per-city scale)   |   BOTTOM BAND = SIF (white -> green, per-city scale)"
      :"TOP BAND = CO2 - mean (blue -> white -> red; negative to positive)   |   BOTTOM BAND = SIF - mean (purple -> white -> green; negative to positive)";
    ctx.fillText(lg,spX0+labW+14,H-legH+8);
    ctx.restore();
    return;
  }
  const topPad=42, botPad=34;
  const plotTop=topPad, plotBot=H-botPad;
  const rowH=(plotBot-plotTop)/Math.max(1,n);

  const allMoSet=new Set();
  S.sel.forEach(nm=>filtMo(nm).forEach(m=>allMoSet.add(m)));
  const allMo=Array.from(allMoSet).sort();
  if(!allMo.length){noDataMsg("No data in selected time range");return;}
  const xSc=(spW*.92)/Math.max(1,allMo.length-1);
  const xOf=j=>spX0+j*xSc;

  ctx.save();
  ctx.fillStyle="rgba(7,10,16,.35)";
  ctx.fillRect(spX0-8,plotTop-8,spW*.92+16,plotBot-plotTop+16);
  ctx.strokeStyle="rgba(95,120,165,.22)"; ctx.lineWidth=.8;
  ctx.strokeRect(spX0-8,plotTop-8,spW*.92+16,plotBot-plotTop+16);
  const step=Math.max(1,Math.floor(allMo.length/8));
  allMo.forEach((m,j)=>{
    if(j%step!==0&&j!==allMo.length-1) return;
    const x=xOf(j);
    ctx.strokeStyle="rgba(85,110,150,.18)"; ctx.lineWidth=.7;
    ctx.beginPath(); ctx.moveTo(x,plotTop-6); ctx.lineTo(x,plotBot+6); ctx.stroke();
    ctx.fillStyle="#7c8ca8"; ctx.font="8px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="top"; ctx.fillText(m,x,plotBot+10);
  });
  // Blackout overlay columns in pulse timeseries panel
  allMo.forEach((m,j)=>{
    if(!isBlackoutMonth(m)) return;
    const x=xOf(j);
    ctx.fillStyle="rgba(0,0,0,.88)";
    ctx.fillRect(x-1,plotTop-6,Math.max(2,xSc*.94),plotBot-plotTop+12);
  });
  // Axis titles (x-axis unchanged as requested)
  ctx.fillStyle="#9aaacd"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillText("XCO2 time series (per-city y-scale)",spX0,plotTop-14);
  ctx.save();
  ctx.translate(spX0-34,(plotTop+plotBot)/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle="#9aaacd"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillText("Y axis: XCO2 (ppm, per row)",0,0);
  ctx.restore();
  ctx.fillStyle="#9aaacd"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillText("X axis: Time (YYYY-MM)",spX0+spW*.46,plotBot+24);
  ctx.restore();

  S.sel.forEach((name,i)=>{
    const c=CITY_DATA.find(x=>x.name===name); if(!c) return;
    const col=S.colors[name];
    const rowY=plotTop+rowH*(i+.5);
    const cpF=isFrontHemisphere(projF,c.lon,c.lat)?projF([c.lon,c.lat]):null;
    const cpB=isFrontHemisphere(projB,c.lon,c.lat)?projB([c.lon,c.lat]):null;
    const cp=cpF||cpB;
    const cMo=filtMo(name);
    const stats=cityStats(name); if(!stats||!cMo.length) return;
    // Per-row y range
    const rMin=stats.min, rMax=Math.max(stats.max,stats.min+.6);
    const rMid=(rMin+rMax)/2;
    const sX=cp?cp[0]:gCX+gR*1.1, sY=cp?cp[1]:rowY;
    const midX=(sX+spX0)/2;
    ctx.beginPath(); ctx.moveTo(sX,sY);
    ctx.bezierCurveTo(midX+50,sY,midX-50,rowY,spX0,rowY);
    ctx.strokeStyle=ha(col,.35); ctx.lineWidth=1; ctx.stroke();
    if(cpF){ctx.beginPath();ctx.arc(cpF[0],cpF[1],4.5,0,TAU);ctx.fillStyle=col;ctx.fill();}
    if(cpB){ctx.beginPath();ctx.arc(cpB[0],cpB[1],4.5,0,TAU);ctx.fillStyle=col;ctx.fill();}

    const spH=Math.min(rowH*.68,36);
    const yTop=rowY-spH/2, yBot=rowY+spH/2;
    ctx.fillStyle="rgba(9,13,22,.28)";
    ctx.fillRect(spX0-2,yTop-1,spW*.92+4,spH+2);
    ctx.strokeStyle=ha(col,.14); ctx.lineWidth=.6;
    ctx.strokeRect(spX0-2,yTop-1,spW*.92+4,spH+2);
    const yMid=yBot-(rMid-rMin)/(rMax-rMin)*spH;
    ctx.beginPath(); ctx.moveTo(spX0,yMid); ctx.lineTo(spX0+spW*.92,yMid);
    ctx.strokeStyle="rgba(95,120,165,.2)"; ctx.lineWidth=.55; ctx.stroke();
    // Per-row y labels
    ctx.fillStyle=ha(col,.78); ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle";
    ctx.fillText(rMax.toFixed(1)+" ppm",spX0-10,yTop+1);
    ctx.fillText(rMid.toFixed(1)+" ppm",spX0-10,yMid);
    ctx.fillText(rMin.toFixed(1)+" ppm",spX0-10,yBot-1);

    const mo=CO2_MONTHLY[name]||{};
    let started=false;
    ctx.beginPath();
    allMo.forEach((m,j)=>{
      const v=mo[m]; if(v===undefined) return;
      const sx=xOf(j);
      const sy=yBot-(v-rMin)/(rMax-rMin)*spH;
      if(!started){ctx.moveTo(sx,sy);started=true;}else{ctx.lineTo(sx,sy);}
    });
    ctx.strokeStyle=col; ctx.lineWidth=1.6; ctx.stroke();

    const lastMo=cMo[cMo.length-1];
    const lastJ=allMo.indexOf(lastMo);
    if(lastJ>=0&&mo[lastMo]!==undefined){
      const lSx=xOf(lastJ);
      const lSy=yBot-(mo[lastMo]-rMin)/(rMax-rMin)*spH;
      ctx.beginPath(); ctx.arc(lSx,lSy,4,0,TAU); ctx.fillStyle=col; ctx.fill();
    }

    ctx.font="bold 11px Segoe UI,sans-serif"; ctx.fillStyle=col;
    ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText(name,spX0,yTop-4);
    ctx.font="9px Segoe UI,sans-serif"; ctx.fillStyle=ha(col,.65);
    const curr=mo[lastMo];
    const currTxt=curr!=null?curr.toFixed(2)+" ppm":"no point";
    ctx.fillText("latest: "+currTxt+" · avg "+stats.avg.toFixed(2)+" ppm · "+cMo.length+" months",spX0,yTop-14);
    // Row-level blackout repaint so masked section remains opaque above lines
    allMo.forEach((m,j)=>{
      if(!isBlackoutMonth(m)) return;
      const x=xOf(j);
      ctx.fillStyle="rgba(0,0,0,.92)";
      ctx.fillRect(x-1,yTop-1,Math.max(2,xSc*.94),spH+2);
    });
  });
}

// ── TIMELINE RANGE BRUSH ─────────────────────────────────────────
// Converts x pixel to year (clamped) for the timeline range brush
const TL={drag:null}; // {mode:'from'|'to'|'pan', x0, from0, to0}
function setYearRange(from,to){
  S.yfrom=Math.max(YEARS[0],Math.min(YEARS[YEARS.length-1],from));
  S.yto  =Math.max(S.yfrom, Math.min(YEARS[YEARS.length-1],to));
  // Sync sidebar selects
  const fy=document.getElementById("yfrom"),ty=document.getElementById("yto");
  if(fy) fy.value=S.yfrom; if(ty) ty.value=S.yto;
  updateMonthsHint(); render();
}

// ── VIEW 3: Bubble Timeline ───────────────────────────────────────
function drawV3(){
  ctx.clearRect(0,0,W,H);
  if(!S.sel.length){noDataMsg("Select cities to see the bubble timeline");return;}
  const n=S.sel.length;
  const labW=120, legH=50, topPad=52; // extra topPad for range brush
  const allMoSet=new Set();
  S.sel.forEach(nm=>filtMo(nm).forEach(m=>allMoSet.add(m)));
  const months=Array.from(allMoSet).sort();
  if(!months.length){noDataMsg("No data in selected time range");return;}
  const M=months.length;
  const cellW=Math.max(9,Math.min(32,(W-labW-24)/M));
  const totW=cellW*M;
  const startX=labW+(W-labW-24-totW)/2;
  const plotH=H-legH-topPad;
  const rowH=plotH/(n+.5);

  // ── Range brush strip ──────────────────────────────────────────
  const bY=6, bH=18, bX=startX, bW=totW;
  const yr0=YEARS[0], yr1=YEARS[YEARS.length-1];
  const ySpan=yr1-yr0;
  // Background track
  ctx.fillStyle="#0d0d0d"; ctx.strokeStyle="#222"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(bX,bY,bW,bH,3); ctx.fill(); ctx.stroke();
  // Year ticks on track
  YEARS.forEach(y=>{
    const tx=bX+(y-yr0)/ySpan*bW;
    ctx.fillStyle="#1e1e1e"; ctx.fillRect(tx-.4,bY+2,1,bH-4);
    ctx.fillStyle="#444"; ctx.font="8px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(y,tx,bY+bH+8);
  });
  // Selected range highlight
  const selX0=bX+(S.yfrom-yr0)/ySpan*bW;
  const selX1=bX+(S.yto+1-yr0)/ySpan*bW;
  ctx.fillStyle="rgba(0,245,255,0.12)";
  ctx.beginPath(); ctx.roundRect(selX0,bY,selX1-selX0,bH,2); ctx.fill();
  ctx.strokeStyle="rgba(0,245,255,0.5)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(selX0,bY,selX1-selX0,bH,2); ctx.stroke();
  // Drag handles
  [selX0,selX1].forEach((hx,i)=>{
    ctx.fillStyle="#00f5ff";
    ctx.beginPath(); ctx.roundRect(hx-3,bY,6,bH,2); ctx.fill();
    ctx.fillStyle="#000"; ctx.font="bold 8px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(i===0?S.yfrom:S.yto, hx+(i===0?-14:14), bY+bH/2);
  });
  // Label
  ctx.fillStyle="#555"; ctx.font="8px Segoe UI,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText("\u2194 drag to zoom range", bX, bY+bH+8+9);

  // Store brush geometry for hit test
  S._tlBrush={bX,bY,bW,bH,yr0,yr1,ySpan};

  // Year dividers + labels on the main plot
  const yBkt={};
  months.forEach((m,i)=>{const y=m.slice(0,4);if(!yBkt[y])yBkt[y]=[];yBkt[y].push(i);});
  ctx.save();
  ctx.fillStyle="#666"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="top";
  Object.entries(yBkt).forEach(([yr,idxs])=>{
    const mi=(idxs[0]+idxs[idxs.length-1])/2;
    ctx.fillText(yr,startX+mi*cellW+cellW/2,topPad-14);
    if(idxs[0]>0){ctx.strokeStyle="#111";ctx.lineWidth=.6;
      ctx.beginPath();ctx.moveTo(startX+idxs[0]*cellW,topPad-2);ctx.lineTo(startX+idxs[0]*cellW,topPad+plotH-legH+12);ctx.stroke();}
  });
  S.sel.forEach((name,i)=>{
    const c=CITY_DATA.find(x=>x.name===name); if(!c) return;
    const col=S.colors[name];
    const rowY=topPad+rowH*(i+.62);
    const mo=CO2_MONTHLY[name]||{};
    const stats=cityStats(name)||{min:410,max:425};
    const rng=Math.max(stats.max-stats.min,.5);
    ctx.font="bold 11px Segoe UI,sans-serif"; ctx.fillStyle=col;
    ctx.textAlign="right"; ctx.textBaseline="middle";
    ctx.fillText(name.length>15?name.slice(0,14)+"\u2026":name,labW-9,rowY);
    ctx.font="8px Segoe UI,sans-serif"; ctx.fillStyle="#888";
    ctx.fillText(c.country.split(" ").pop(),labW-9,rowY+13);
    months.forEach((m,j)=>{
      const val=mo[m];
      const cx2=startX+j*cellW+cellW/2;
      if(val===undefined){
        ctx.beginPath();ctx.arc(cx2,rowY,1.2,0,TAU);
        ctx.fillStyle="rgba(20,20,20,.5)";ctx.fill();return;
      }
      // Real SIF for that city-month; fallback to simulation
      const sifMo=SIF_MONTHLY[c.name];
      const sv=sifMo&&sifMo[m]!=null?sifMo[m]:_sifSim(c.lat,m);
      const sn=Math.max(0,Math.min(1,sv/.45));  // normalize 0–0.45 → 0–1
      const r=3+10*(val-stats.min)/rng;
      const a=.18+.76*sn;
      const grd=ctx.createRadialGradient(cx2,rowY,0,cx2,rowY,r*2);
      grd.addColorStop(0,ha(col,a*.45));grd.addColorStop(1,ha(col,0));
      ctx.beginPath();ctx.arc(cx2,rowY,r*2,0,TAU);ctx.fillStyle=grd;ctx.fill();
      ctx.beginPath();ctx.arc(cx2,rowY,r,0,TAU);ctx.fillStyle=ha(col,a);ctx.fill();
      if(isBlackoutMonth(m)){
        ctx.fillStyle="rgba(0,0,0,.92)";
        ctx.fillRect(startX+j*cellW,rowY-12,Math.max(1,cellW-1),24);
      }
    });
  });
  ctx.fillStyle="#111"; ctx.fillRect(labW,H-legH,W-labW,legH);
  ctx.fillStyle="#aaa"; ctx.font="9px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("CIRCLE SIZE = XCO\u2082 relative to city range   |   BRIGHTNESS = SIF (OCO-3, W/m\u00b2/sr/nm)",labW+14,H-legH+8);
  [.15,.5,1].forEach((f,k)=>{const r=3+10*f;const bx=labW+20+k*60;const by=H-legH+32;
    ctx.beginPath();ctx.arc(bx,by,r,0,TAU);ctx.strokeStyle="#888";ctx.lineWidth=1.2;ctx.stroke();
    ctx.fillStyle="#aaa";ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(f>.6?"high":f<.3?"low":"mid",bx,by+r+2);
  });
  ctx.restore();
  drawMinimap(.7);
}

// ── VIEW 4: Scatter ───────────────────────────────────────────────
function scatScale(vals, useLog, rangeMin, rangeMax){
  // Returns a function: value -> pixel coordinate (rangeMin..rangeMax maps to 0..1)
  const finite = vals.filter(v=>v!=null&&isFinite(v)&&(!useLog||v>0));
  if(!finite.length) return ()=>rangeMin;
  let lo = d3.min(finite), hi = d3.max(finite);
  if(useLog){ lo=Math.max(lo*.85,1e-9); hi=hi*1.15; }
  else { const pad=(hi-lo)*.07; lo-=pad; hi+=pad; }
  return v=>{
    if(v==null) return null;
    let t;
    if(useLog){ t=(Math.log(v)-Math.log(lo))/(Math.log(hi)-Math.log(lo)); }
    else { t=(v-lo)/(hi-lo); }
    return rangeMin+(rangeMax-rangeMin)*Math.max(0,Math.min(1,t));
  };
}
function niceLogTicks(lo, hi, n=6){
  const ticks=[];
  const logLo=Math.floor(Math.log10(lo)), logHi=Math.ceil(Math.log10(hi));
  for(let e=logLo;e<=logHi;e++){
    [1,2,5].forEach(m=>{
      const v=m*Math.pow(10,e);
      if(v>=lo*.9&&v<=hi*1.1) ticks.push(v);
    });
  }
  return ticks.slice(0,n+2);
}
function niceLinTicks(lo, hi, n=6){
  const step=Math.pow(10,Math.floor(Math.log10((hi-lo)/n)));
  const ticks=[];
  for(let v=Math.ceil(lo/step)*step; v<=hi*1.001; v+=step) ticks.push(parseFloat(v.toFixed(10)));
  return ticks;
}
function szColor(c, colKey, mo, colVals){
  const v=scatVal(c, colKey, mo);
  if(v==null) return 'rgba(60,60,70,0.5)';
  // SIF uses dedicated ecological ramp (brown→green)
  if(colKey==='sif') return sifColorAlpha(v, 0.82);
  // Other variables: blue→cyan→green→yellow→red (low→high)
  const mn=d3.min(colVals.filter(x=>x!=null)), mx=d3.max(colVals.filter(x=>x!=null));
  const t=(v-mn)/(mx-mn||1);
  const r=Math.round(t<.5?0:255*(t-.5)*2);
  const g=Math.round(t<.5?255*t*2:255*(1-(t-.5)*2));
  const b=Math.round(t<.5?255*(1-t*2):0);
  return `rgba(${r},${Math.max(g,30)},${Math.max(b,20)},0.75)`;
}
function drawV4(){
  ctx.clearRect(0,0,W,H);
  const {x:xk,y:yk,sz:szk,col:colk}=S.scat;
  const xDef=SCAT_VARS[xk], yDef=SCAT_VARS[yk];
  const ml=86,mr=120,mt=98,mb=84;
  const pw=W-ml-mr,ph=H-mt-mb;

  const cities=scatCities();
  if(!cities.length){noDataMsg("No data for selected axes in this time range.");return;}

  // Compute per-city values
  const cityEntries=cities.map(c=>{
    const mo=filtMo(c.name);
    return {c, mo, xv:scatVal(c,xk,mo), yv:scatVal(c,yk,mo), szv:scatVal(c,szk,mo), colv:scatVal(c,colk,mo)};
  }).filter(e=>e.xv!=null&&e.yv!=null);

  if(!cityEntries.length){noDataMsg("Not enough data for current settings.");return;}

  const xVals=cityEntries.map(e=>e.xv), yVals=cityEntries.map(e=>e.yv);
  const szVals=cityEntries.map(e=>e.szv).filter(v=>v!=null);
  const colVals=cityEntries.map(e=>e.colv);
  const maxSz=d3.max(szVals)||1;

  const xPx=scatScale(xVals,xDef.log,ml,ml+pw);
  // Y is inverted (high value = top)
  const yPx_fwd=scatScale(yVals,yDef.log,mt,mt+ph);
  const yPx=v=>{ const p=yPx_fwd(v); return p==null?null: mt+ph-(p-mt); };

  ctx.save();

  // Draw grid lines subtle
  ctx.strokeStyle="#111"; ctx.lineWidth=.5; ctx.setLineDash([3,6]);
  // vertical grid
  const xFinite=xVals.filter(v=>v>0||!xDef.log);
  const xLo=d3.min(xFinite)*.85, xHi=d3.max(xFinite)*1.15;
  const xTicksRaw=xDef.log?niceLogTicks(xLo,xHi):niceLinTicks(d3.min(xFinite),d3.max(xFinite));
  const minXTickPx=90;
  const xTicks=[]; let lastXTickPx=-Infinity;
  for(const v of xTicksRaw){
    const px=xPx(v); if(px==null) continue;
    if(px-lastXTickPx>=minXTickPx){xTicks.push(v);lastXTickPx=px;}
  }
  xTicks.forEach(v=>{const px=xPx(v);if(px>ml&&px<ml+pw){ctx.beginPath();ctx.moveTo(px,mt);ctx.lineTo(px,mt+ph);ctx.stroke();}});
  const yFinite=yVals.filter(v=>v>0||!yDef.log);
  const yLo=d3.min(yFinite)*.85, yHi=d3.max(yFinite)*1.15;
  const yTicks=yDef.log?niceLogTicks(yLo,yHi):niceLinTicks(d3.min(yFinite),d3.max(yFinite));
  yTicks.forEach(v=>{const py=yPx(v);if(py>mt&&py<mt+ph){ctx.beginPath();ctx.moveTo(ml,py);ctx.lineTo(ml+pw,py);ctx.stroke();}});
  ctx.setLineDash([]);

  // Axes
  ctx.strokeStyle="#282828"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ml,mt); ctx.lineTo(ml,mt+ph); ctx.lineTo(ml+pw,mt+ph); ctx.stroke();

  // Tick labels X
  ctx.fillStyle="#999"; ctx.font="9px Segoe UI,sans-serif";
  xTicks.forEach(v=>{
    const px=xPx(v); if(px<=ml||px>ml+pw) return;
    ctx.beginPath();ctx.moveTo(px,mt+ph);ctx.lineTo(px,mt+ph+3);ctx.strokeStyle="#333";ctx.lineWidth=.8;ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="top";
    const lbl=xDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':xDef.fmt(v);
    ctx.fillText(lbl,px,mt+ph+5);
  });
  // Tick labels Y
  yTicks.forEach(v=>{
    const py=yPx(v); if(py<=mt||py>mt+ph) return;
    ctx.beginPath();ctx.moveTo(ml-3,py);ctx.lineTo(ml,py);ctx.strokeStyle="#333";ctx.lineWidth=.8;ctx.stroke();
    ctx.textAlign="right"; ctx.textBaseline="middle";
    const lbl=yDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':yDef.fmt(v);
    ctx.fillText(lbl,ml-5,py);
  });

  // Axis labels
  ctx.fillStyle="#aaa"; ctx.font="10px Segoe UI,sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillText(xDef.label+(xDef.log?' [log]':''),ml+pw/2,mt+ph+22);
  ctx.save(); ctx.translate(14,mt+ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle="#aaa"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(yDef.label+(yDef.log?' [log]':''),0,0);
  ctx.restore();

  // Draw unselected cities first
  for(const {c,mo,xv,yv,szv,colv} of cityEntries){
    const isSel=S.sel.includes(c.name), isHov=S.hover===c.name;
    if(isSel||isHov) continue;
    const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
    const r=szk==='uniform'?5:(szv!=null?3+10*Math.sqrt(Math.max(0,szv/maxSz)):4);
    const col=szColor(c,colk,mo,colVals);
    ctx.beginPath(); ctx.arc(px,py,r,0,TAU);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle="rgba(120,120,140,0.22)"; ctx.lineWidth=.6; ctx.stroke();
  }
  // Draw selected/hovered on top
  for(const {c,mo,xv,yv,szv,colv} of cityEntries){
    const isSel=S.sel.includes(c.name), isHov=S.hover===c.name;
    if(!isSel&&!isHov) continue;
    const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
    const r=szk==='uniform'?6:(szv!=null?4+12*Math.sqrt(Math.max(0,szv/maxSz)):5);
    const col=S.colors[c.name]||"#fff";
    const grd=ctx.createRadialGradient(px,py,0,px,py,r*2.2);
    grd.addColorStop(0,ha(col,.22)); grd.addColorStop(1,ha(col,0));
    ctx.beginPath(); ctx.arc(px,py,r*2.2,0,TAU); ctx.fillStyle=grd; ctx.fill();
    ctx.beginPath(); ctx.arc(px,py,r,0,TAU);
    ctx.fillStyle=ha(col,.35); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=isSel?2:1.2; ctx.stroke();
    ctx.font="bold 10px Segoe UI,sans-serif";
    ctx.fillStyle=col; ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText(c.name,px+r+3,py);
  }

  // Legend: size
  const lx=ml+pw+mr-6, ly=mt+4;
  if(szk!=='uniform'){
    const szDef=SCAT_VARS[szk];
    ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="top";
    ctx.fillText(szDef.short,lx,ly);
    [.2,.5,1].forEach((f,i)=>{
      const r=3+10*Math.sqrt(f);
      const cy=ly+14+i*28+r;
      ctx.beginPath(); ctx.arc(lx-r-2,cy,r,0,TAU);
      ctx.fillStyle="rgba(80,80,90,0.4)"; ctx.fill();
      ctx.strokeStyle="#444"; ctx.lineWidth=.7; ctx.stroke();
      ctx.fillStyle="#888"; ctx.textAlign="right"; ctx.textBaseline="middle";
      const sv=f*maxSz;
      const lbl=szDef.log&&sv>=1000?sv>=1e6?(sv/1e6).toFixed(0)+'M':(sv/1000).toFixed(0)+'k':szDef.fmt(sv);
      ctx.fillText(lbl,lx-r*2-6,cy);
    });
  }
  // Legend: color bar
  {
    const colDef=SCAT_VARS[colk];
    const barH=80, barW=10;
    const barY=Math.max(ly+40, szk==='uniform'?ly+40:ly+110);
    ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="top";
    ctx.fillText(colDef.short,lx,barY);
    const colValsF=colVals.filter(v=>v!=null);
    const cMin=colValsF.length?d3.min(colValsF):0;
    const cMax=colValsF.length?d3.max(colValsF):1;
    for(let i=0;i<barH;i++){
      const t=(barH-1-i)/barH; // top=high, bottom=low
      let colStr;
      if(colk==='sif'){
        colStr=sifColor(t*0.45);
      } else {
        const r=Math.round(t<.5?0:255*(t-.5)*2);
        const g=Math.round(t<.5?255*t*2:255*(1-(t-.5)*2));
        const b=Math.round(t<.5?255*(1-t*2):0);
        colStr=`rgba(${r},${Math.max(g,30)},${Math.max(b,20)},0.85)`;
      }
      ctx.fillStyle=colStr;
      ctx.fillRect(lx-barW,barY+12+i,barW,1);
    }
    ctx.strokeStyle="#333"; ctx.lineWidth=.5;
    ctx.strokeRect(lx-barW,barY+12,barW,barH);
    if(colValsF.length){
      const fmtC=v=>colDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':colDef.fmt(v);
      ctx.fillStyle="#999"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="right"; ctx.textBaseline="middle";
      ctx.fillText(fmtC(cMax),lx-barW-3,barY+14);
      ctx.fillText(fmtC(cMin),lx-barW-3,barY+10+barH);
    }
  }

  // Info footer
  const needsAhn=AHN_VARS.has(xk)||AHN_VARS.has(yk)||AHN_VARS.has(szk);
  ctx.fillStyle="#666"; ctx.font="8.5px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  const src=needsAhn?"OCO-3 SAM + Ahn et al. 2025":"OCO-3 SAM";
  ctx.fillText(`${cityEntries.length} cities · ${src} · SIF: real OCO-3 data`,ml,mt-44);

  ctx.restore();
  drawMinimap(.7);
}

function drawV5(){
  ctx.clearRect(0,0,W,H);
  const {x:xk,y:yk,sz:szk}=S.scat;
  const xDef=SCAT_VARS[xk], yDef=SCAT_VARS[yk];
  const baseMl=86, baseMr=24, baseMt=170, baseMb=90;
  const availW=W-baseMl-baseMr, availH=H-baseMt-baseMb;
  const side=Math.max(160,Math.min(availW,availH));
  const ml=baseMl+Math.max(0,(availW-side)/2);
  const mt=baseMt+Math.max(0,(availH-side)/2);
  const pw=side, ph=side;

  const cities=CITY_DATA;
  if(!cities.length){noDataMsg("No data for selected axes in this time range.");return;}

  const cityEntries=cities.map(c=>{
    const mo=filtMo(c.name);
    return {c,mo,xv:scatVal(c,xk,mo),yv:scatVal(c,yk,mo),szv:scatVal(c,szk,mo)};
  }).filter(e=>e.xv!=null&&e.yv!=null);
  if(!cityEntries.length){noDataMsg("Not enough data for current settings.");return;}

  const xVals=cityEntries.map(e=>e.xv), yVals=cityEntries.map(e=>e.yv);
  const szVals=cityEntries.map(e=>e.szv).filter(v=>v!=null);
  const maxSz=d3.max(szVals)||1;
  const xPx=scatScale(xVals,xDef.log,ml,ml+pw);
  const yPx_fwd=scatScale(yVals,yDef.log,mt,mt+ph);
  const yPx=v=>{ const p=yPx_fwd(v); return p==null?null: mt+ph-(p-mt); };

  const xFinite=xVals.filter(v=>v>0||!xDef.log);
  const yFinite=yVals.filter(v=>v>0||!yDef.log);
  const xLo=d3.min(xFinite)*.85, xHi=d3.max(xFinite)*1.15;
  const yLo=d3.min(yFinite)*.85, yHi=d3.max(yFinite)*1.15;
  const xTicksRaw=xDef.log?niceLogTicks(xLo,xHi):niceLinTicks(d3.min(xFinite),d3.max(xFinite));
  const minXTickPx=90;
  const xTicks=[]; let lastXTickPx=-Infinity;
  for(const v of xTicksRaw){
    const px=xPx(v); if(px==null) continue;
    if(px-lastXTickPx>=minXTickPx){xTicks.push(v);lastXTickPx=px;}
  }
  const yTicks=yDef.log?niceLogTicks(yLo,yHi):niceLinTicks(d3.min(yFinite),d3.max(yFinite));

  const xMid=d3.median(xVals), yMid=d3.median(yVals);
  const xMidPx=xPx(xMid), yMidPx=yPx(yMid);
  if(xMidPx==null||yMidPx==null) return;

  const xNm=xDef.short||xDef.label;
  const yNm=yDef.short||yDef.label;
  const qStyles={
    HH:{col:'rgba(255,138,76,0.86)',lbl:`High ${yNm}, High ${xNm}`},
    HL:{col:'rgba(226,97,196,0.86)',lbl:`High ${yNm}, Low ${xNm}`},
    LH:{col:'rgba(0,219,190,0.86)',lbl:`Low ${yNm}, High ${xNm}`},
    LL:{col:'rgba(87,143,255,0.86)',lbl:`Low ${yNm}, Low ${xNm}`}
  };
  const qKey=(xv,yv)=>(yv>=yMid?'H':'L')+(xv>=xMid?'H':'L');
  const qCounts={HH:0,HL:0,LH:0,LL:0};
  cityEntries.forEach(e=>qCounts[qKey(e.xv,e.yv)]++);

  ctx.save();
  ctx.strokeStyle="#111"; ctx.lineWidth=.5; ctx.setLineDash([3,6]);
  xTicks.forEach(v=>{const px=xPx(v);if(px>ml&&px<ml+pw){ctx.beginPath();ctx.moveTo(px,mt);ctx.lineTo(px,mt+ph);ctx.stroke();}});
  yTicks.forEach(v=>{const py=yPx(v);if(py>mt&&py<mt+ph){ctx.beginPath();ctx.moveTo(ml,py);ctx.lineTo(ml+pw,py);ctx.stroke();}});
  ctx.setLineDash([]);

  ctx.strokeStyle="#282828"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ml,mt); ctx.lineTo(ml,mt+ph); ctx.lineTo(ml+pw,mt+ph); ctx.stroke();

  ctx.fillStyle="#999"; ctx.font="9px Segoe UI,sans-serif";
  xTicks.forEach(v=>{
    const px=xPx(v); if(px<=ml||px>ml+pw) return;
    ctx.beginPath();ctx.moveTo(px,mt+ph);ctx.lineTo(px,mt+ph+3);ctx.strokeStyle="#333";ctx.lineWidth=.8;ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="top";
    const lbl=xDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':xDef.fmt(v);
    ctx.fillText(lbl,px,mt+ph+5);
  });
  yTicks.forEach(v=>{
    const py=yPx(v); if(py<=mt||py>mt+ph) return;
    ctx.beginPath();ctx.moveTo(ml-3,py);ctx.lineTo(ml,py);ctx.strokeStyle="#333";ctx.lineWidth=.8;ctx.stroke();
    ctx.textAlign="right"; ctx.textBaseline="middle";
    const lbl=yDef.log&&v>=1000?v>=1e6?(v/1e6).toFixed(0)+'M':(v/1000).toFixed(0)+'k':yDef.fmt(v);
    ctx.fillText(lbl,ml-5,py);
  });

  ctx.fillStyle="#aaa"; ctx.font="10px Segoe UI,sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillText(xDef.label+(xDef.log?' [log]':''),ml+pw/2,mt+ph+22);
  ctx.save(); ctx.translate(14,mt+ph/2); ctx.rotate(-Math.PI/2);
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(yDef.label+(yDef.log?' [log]':''),0,0);
  ctx.restore();

  for(const {c,xv,yv,szv} of cityEntries){
    const isSel=S.sel.includes(c.name), isHov=S.hover===c.name;
    if(isSel||isHov) continue;
    const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
    const r=szk==='uniform'?4.2:(szv!=null?2.4+8.2*Math.sqrt(Math.max(0,szv/maxSz)):3.2);
    const q=qKey(xv,yv);
    ctx.beginPath(); ctx.arc(px,py,r,0,TAU);
    const dark=qStyles[q].col.replace(/0\.\d+\)/,'0.20)');
    ctx.fillStyle=dark;
    ctx.fill();
  }
  for(const {c,xv,yv,szv} of cityEntries){
    const isSel=S.sel.includes(c.name), isHov=S.hover===c.name;
    if(!isSel&&!isHov) continue;
    const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
    const r=szk==='uniform'?6.8:(szv!=null?4.8+13.5*Math.sqrt(Math.max(0,szv/maxSz)):5.8);
    const q=qKey(xv,yv);
    const halo=ctx.createRadialGradient(px,py,0,px,py,r*2.6);
    halo.addColorStop(0,ha("#dcedff",isHov?0.34:0.28));
    halo.addColorStop(0.45,ha("#dcedff",isHov?0.14:0.10));
    halo.addColorStop(1,ha("#cfe0ff",0));
    ctx.beginPath();
    ctx.arc(px,py,r*2.6,0,TAU);
    ctx.fillStyle=halo;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px,py,r,0,TAU);
    ctx.fillStyle=qStyles[q].col;
    ctx.fill();
    ctx.strokeStyle=isHov?"rgba(250,250,255,0.95)":"rgba(240,245,255,0.78)";
    ctx.lineWidth=isHov?1.8:1.2;
    ctx.stroke();
    ctx.font="bold 10px Segoe UI,sans-serif";
    ctx.fillStyle="#e6eefc"; ctx.textAlign="left"; ctx.textBaseline="bottom";
    ctx.fillText(c.name,px+r+3,py);
  }

  ctx.setLineDash([6,5]);
  ctx.strokeStyle="rgba(170,170,170,.55)";
  ctx.lineWidth=1.1;
  ctx.beginPath(); ctx.moveTo(xMidPx,mt); ctx.lineTo(xMidPx,mt+ph); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ml,yMidPx); ctx.lineTo(ml+pw,yMidPx); ctx.stroke();
  ctx.setLineDash([]);

  const infoY=72;
  const lgPad=7, chipH=13, chipGap=6;
  const availTopW=Math.max(260,pw);
  const cols=availTopW>620?4:2;
  const rows=Math.ceil(4/cols);
  const legendW=availTopW;
  const chipW=Math.floor((legendW-lgPad*2-chipGap*(cols-1))/cols);
  const legendH=18 + rows*chipH + (rows-1)*chipGap + lgPad*2 + 10;
  const lx=ml, ly=88;
  ctx.fillStyle="rgba(8,8,8,.88)";
  ctx.strokeStyle="#222";
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.roundRect(lx,ly,legendW,legendH,4);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle="#aaa"; ctx.font="bold 9px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("QUADRANT GROUPS",lx+lgPad,ly+4);
  const order=['HH','HL','LH','LL'];
  order.forEach((k,i)=>{
    const row=Math.floor(i/cols), col=i%cols;
    const x=lx+lgPad+col*(chipW+chipGap), y=ly+18+row*(chipH+chipGap);
    ctx.fillStyle=qStyles[k].col; ctx.fillRect(x,y+2,10,10);
    ctx.strokeStyle="#2c2c2c"; ctx.lineWidth=.8; ctx.strokeRect(x,y+2,10,10);
    ctx.fillStyle="#9a9a9a"; ctx.font="8.5px Segoe UI,sans-serif";
    ctx.fillText(`${qStyles[k].lbl} (${qCounts[k]})`,x+16,y);
  });
  ctx.fillStyle="#777"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText(`Split at medians: ${xNm}=${xDef.fmt(xMid)}, ${yNm}=${yDef.fmt(yMid)}`,lx+lgPad,ly+legendH-11);

  const needsAhn=AHN_VARS.has(xk)||AHN_VARS.has(yk)||AHN_VARS.has(szk);
  const src=needsAhn?"OCO-3 SAM + Ahn et al. 2025":"OCO-3 SAM";
  ctx.fillStyle="#666"; ctx.font="8.5px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText(`${cityEntries.length} cities · ${src} · Quadrant categories`,ml,infoY);
  ctx.restore();
}
