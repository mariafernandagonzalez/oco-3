// Comparison view alternative encoding: split circles
function drawV1SplitCircle(){
  ctx.clearRect(0,0,W,H);
  const sc=Math.min(W,H)*.4;
  const proj=S.flat?mkFlat(W/2,H/2,W/6.6):mkGlobe(W/2,H/2,sc);
  if(S.flat) drawFlatMap(proj); else drawGlobe(proj,{stars:false});

  // Dim all non-selected
  for(const c of CITY_DATA){
    if(S.sel.includes(c.name)) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    ctx.beginPath(); ctx.arc(p[0],p[1],1.5,0,TAU);
    ctx.fillStyle="rgba(35,60,110,0.2)"; ctx.fill();
  }

  // Selected cities with split-circle encoding
  const selPts=[];
  for(const name of S.sel){
    const c=CITY_DATA.find(x=>x.name===name); if(!c) continue;
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const co2=S.month?(CO2_MONTHLY[name]||{})[S.month]:cityStats(name)?.avg;
    const sif=S.month?((SIF_MONTHLY[name]||{})[S.month]??_sifSim(c.lat,S.month)):getSIF(name,filtMo(name));
    selPts.push({name,c,p,co2,sif,col:S.colors[name]});
  }
  const co2Vals=selPts.map(d=>d.co2).filter(v=>v!=null&&isFinite(v));
  const co2Min=co2Vals.length?Math.min(...co2Vals):410;
  const co2Max=co2Vals.length?Math.max(...co2Vals):430;
  const co2Rng=Math.max(0.8,co2Max-co2Min);

  for(const d of selPts){
    const x=d.p[0], y=d.p[1];
    const isHov=S.hover===d.c.name;
    const r=isHov?12:9.5;
    const co2t=d.co2==null?0:(d.co2-co2Min)/co2Rng;
    const cCo2=co2Color01(co2t);
    const cSif=sifColor(d.sif);

    const halo=ctx.createRadialGradient(x,y,0,x,y,r*2.2);
    halo.addColorStop(0,ha(d.col,.22)); halo.addColorStop(1,ha(d.col,0));
    ctx.beginPath(); ctx.arc(x,y,r*2.2,0,TAU); ctx.fillStyle=halo; ctx.fill();

    // Left half = CO2 (white -> dark red)
    ctx.beginPath(); ctx.moveTo(x,y); ctx.arc(x,y,r,Math.PI/2,Math.PI*1.5,false); ctx.closePath();
    ctx.fillStyle=cCo2; ctx.fill();
    // Right half = SIF (white -> green)
    ctx.beginPath(); ctx.moveTo(x,y); ctx.arc(x,y,r,-Math.PI/2,Math.PI/2,false); ctx.closePath();
    ctx.fillStyle=cSif; ctx.fill();
    // Divider and outer ring
    ctx.strokeStyle="rgba(0,0,0,.62)"; ctx.lineWidth=1.0;
    ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x,y+r); ctx.stroke();
    ctx.strokeStyle=ha(d.col,.9); ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.stroke();

    ctx.font="bold 11px Segoe UI,sans-serif";
    ctx.fillStyle=d.col; ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillText(d.name,x,y+r+6);
  }
  drawMinimap(.7);

  // Legend
  ctx.save();
  const lx=14, ly=H-154;
  const LW=240, LH=150;
  ctx.fillStyle="rgba(4,4,6,.82)";
  ctx.strokeStyle="#1a1a1a"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(lx-2,ly-4,LW,LH,4); ctx.fill(); ctx.stroke();

  ctx.fillStyle="#aaa"; ctx.font="bold 8.5px Segoe UI,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.fillText("ENCODING",lx+2,ly+2);

  // Sample split-circle symbol
  const sx=lx+18, sy=ly+28, rr=8;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.arc(sx,sy,rr,Math.PI/2,Math.PI*1.5,false); ctx.closePath();
  ctx.fillStyle=co2Color01(.85); ctx.fill();
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.arc(sx,sy,rr,-Math.PI/2,Math.PI/2,false); ctx.closePath();
  ctx.fillStyle=sifColor(.42); ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,.6)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx,sy-rr); ctx.lineTo(sx,sy+rr); ctx.stroke();
  ctx.strokeStyle="#6b7da7"; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(sx,sy,rr,0,TAU); ctx.stroke();
  ctx.fillStyle="#777"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText("Left half = CO2 color",sx+16,sy-5);
  ctx.fillText("Right half = SIF color",sx+16,sy+6);

  ctx.fillStyle="#777"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText("CO2 (white -> dark red)",lx+4,ly+46);
  const barW=LW-16, barH=10;
  const bar1X=lx+4, bar1Y=ly+56;
  for(let i=0;i<barW;i++){
    ctx.fillStyle=co2Color01(i/barW);
    ctx.fillRect(bar1X+i,bar1Y,1,barH);
  }
  ctx.strokeStyle="#333"; ctx.lineWidth=.6; ctx.strokeRect(bar1X,bar1Y,barW,barH);
  ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="top"; ctx.fillText(co2Min.toFixed(1)+" ppm",bar1X,bar1Y+barH+2);
  ctx.textAlign="right"; ctx.fillText(co2Max.toFixed(1)+" ppm",bar1X+barW,bar1Y+barH+2);

  ctx.fillStyle="#777"; ctx.font="8px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText("SIF (white -> green)",lx+4,ly+86);
  const bar2X=lx+4, bar2Y=ly+96;
  for(let i=0;i<barW;i++){
    ctx.fillStyle=sifColor(i/barW*0.45);
    ctx.fillRect(bar2X+i,bar2Y,1,barH);
  }
  ctx.strokeStyle="#333"; ctx.lineWidth=.6; ctx.strokeRect(bar2X,bar2Y,barW,barH);
  ctx.fillStyle="#888"; ctx.font="8px Segoe UI,sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="top"; ctx.fillText("0",bar2X,bar2Y+barH+2);
  ctx.textAlign="right"; ctx.fillText("0.45+ W/m2/sr/nm",bar2X+barW,bar2Y+barH+2);

  ctx.fillStyle="#555"; ctx.font="7.5px Segoe UI,sans-serif"; ctx.textAlign="left";
  ctx.fillText("Outer ring color = city identity",lx+4,ly+LH-12);
  ctx.restore();

  if(S.month){
    ctx.fillStyle="rgba(0,0,0,.75)";
    ctx.beginPath(); ctx.roundRect(W/2-52,14,104,22,4); ctx.fill();
    ctx.fillStyle="#00f5ff"; ctx.font="bold 12px Segoe UI,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(S.month,W/2,25);
  }
  drawScrubber();
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  if(!W||!H) return;
  switch(S.view){
    case 0:drawV0();break; case 1:drawV1SplitCircle();break; case 2:drawV2();break;
    case 3:drawV3();break; case 4:drawV4();break; case 5:drawV5();break;
  }
  updateOverlays();
}

// ── AUTO-ROTATE ───────────────────────────────────────────────────
function animTick(){
  if(S.view<=1&&!S.drag?.on&&Date.now()-lastDrag>2800){
    S.rot.lon=(S.rot.lon+.055)%360;
    render();
  }
  requestAnimationFrame(animTick);
}

// ── CANVAS HIT TEST ───────────────────────────────────────────────
function getProj(){
  if(S.view===0||S.view===1){
    const sc=Math.min(W,H)*.4;
    return S.flat?mkFlat(W/2,H/2,W/6.6):mkGlobe(W/2,H/2,sc);
  }
  if(S.view===2){
    return S._pulseGeom?.front?.proj||null;
  }
  return null;
}
function hitTest(ex,ey){
  const rect=cv.getBoundingClientRect();
  const mx=ex-rect.left, my=ey-rect.top;
  if(S.view===4||S.view===5){
    const {x:xk,y:yk,sz:szk}=S.scat;
    const xDef=SCAT_VARS[xk], yDef=SCAT_VARS[yk];
    let ml, mt, pw, ph;
    if(S.view===5){
      const baseMl=86, baseMr=24, baseMt=118, baseMb=76;
      const availW=W-baseMl-baseMr, availH=H-baseMt-baseMb;
      const side=Math.max(160,Math.min(availW,availH));
      ml=baseMl+Math.max(0,(availW-side)/2);
      mt=baseMt+Math.max(0,(availH-side)/2);
      pw=side; ph=side;
    } else {
      const mr=120, mb=84;
      ml=86; mt=98;
      pw=W-ml-mr; ph=H-mt-mb;
    }
    const cities=S.view===5?CITY_DATA:scatCities();
    const entries=cities.map(c=>{
      const mo=filtMo(c.name);
      return{c,mo,xv:scatVal(c,xk,mo),yv:scatVal(c,yk,mo),szv:scatVal(c,szk,mo)};
    }).filter(e=>e.xv!=null&&e.yv!=null);
    if(!entries.length) return null;
    const xVals=entries.map(e=>e.xv), yVals=entries.map(e=>e.yv);
    const szVals=entries.map(e=>e.szv).filter(v=>v!=null);
    const maxSz=d3.max(szVals)||1;
    const xPx=scatScale(xVals,xDef.log,ml,ml+pw);
    const yPx_fwd=scatScale(yVals,yDef.log,mt,mt+ph);
    const yPx=v=>{const p=yPx_fwd(v);return p==null?null:mt+ph-(p-mt);};
    let near=null,nearD=18;
    for(const {c,xv,yv,szv} of entries){
      const px=xPx(xv), py=yPx(yv); if(px==null||py==null) continue;
      const r=szk==='uniform'?5:(szv!=null?3+10*Math.sqrt(Math.max(0,szv/maxSz)):4);
      const d=Math.hypot(mx-px,my-py);
      if(d<r+8&&d<nearD){near=c;nearD=d;}
    }
    return near;
  }
  if(S.view===2&&S._pulseGeom){
    const pf=S._pulseGeom.front.proj, pb=S._pulseGeom.back.proj;
    let near=null,nearD=14;
    for(const c of CITY_DATA){
      const p1=isFrontHemisphere(pf,c.lon,c.lat)?pf([c.lon,c.lat]):null;
      const p2=isFrontHemisphere(pb,c.lon,c.lat)?pb([c.lon,c.lat]):null;
      if(p1){
        const d=Math.hypot(mx-p1[0],my-p1[1]);
        if(d<nearD){near=c;nearD=d;}
      }
      if(p2){
        const d=Math.hypot(mx-p2[0],my-p2[1]);
        if(d<nearD){near=c;nearD=d;}
      }
    }
    return near;
  }
  const proj=getProj(); if(!proj) return null;
  let near=null,nearD=14;
  for(const c of CITY_DATA){
    const p=proj([c.lon,c.lat]); if(!p) continue;
    const d=Math.hypot(mx-p[0],my-p[1]);
    if(d<nearD){near=c;nearD=d;}
  }
  return near;
}
// ── Helper: is mouse over timeline brush strip? ───────────────────
function tlBrushHit(ex,ey){
  if(S.view!==3||!S._tlBrush) return null;
  const rect=cv.getBoundingClientRect();
  const mx=ex-rect.left, my=ey-rect.top;
  const {bX,bY,bW,bH,yr0,yr1,ySpan}=S._tlBrush;
  if(my<bY-4||my>bY+bH+4) return null;
  if(mx<bX-8||mx>bX+bW+8) return null;
  // Determine what's being hit: left handle, right handle, or track
  const selX0=bX+(S.yfrom-yr0)/ySpan*bW;
  const selX1=bX+(S.yto+1-yr0)/ySpan*bW;
  if(Math.abs(mx-selX0)<8) return 'from';
  if(Math.abs(mx-selX1)<8) return 'to';
  if(mx>=selX0&&mx<=selX1) return 'pan';
  return 'from'; // clicking outside range starts new selection from that end
}

let mdownPos=null;
cv.addEventListener("mousedown",e=>{
  // Timeline metric toggle inside merged Pulse/Timeline view
  if(S.view===2&&S.v2mode==='timeline'&&S._v2tlTog){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const t=S._v2tlTog;
    if(mx>=t.x&&mx<=t.x+t.w&&my>=t.y&&my<=t.y+t.h){
      S.v2timelineMetric = (mx<t.x+t.w/2)?'raw':'anomaly';
      render();
      return;
    }
  }
  // Pulse/Timestamp in-view mode toggle
  if(S.view===2&&S._v2tog){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const t=S._v2tog;
    if(mx>=t.x&&mx<=t.x+t.w&&my>=t.y&&my<=t.y+t.h){
      S.v2mode = (mx<t.x+t.w/2)?'pulse':'timeline';
      render();
      return;
    }
  }
  // Month scrubber takes top priority in V0/V1
  if(scrubberHit(e.clientX,e.clientY)){
    SCR.drag=true; scrubToX(e.clientX); cv.style.cursor='ew-resize'; return;
  }
  // Timeline brush takes priority over globe drag
  const tlHit=tlBrushHit(e.clientX,e.clientY);
  if(tlHit){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    TL.drag={mode:tlHit, x0:mx, from0:S.yfrom, to0:S.yto};
    cv.style.cursor='ew-resize';
    return;
  }
  if(S.view===2){
    const pg=S._pulseGeom;
    if(pg){
      const rect=cv.getBoundingClientRect();
      const mx=e.clientX-rect.left,my=e.clientY-rect.top;
      const inF=Math.hypot(mx-pg.front.cx,my-pg.front.cy)<=pg.front.r+8;
      const inB=Math.hypot(mx-pg.back.cx,my-pg.back.cy)<=pg.back.r+8;
      if(inF||inB){
        if(!S.pulseRot) S.pulseRot={lon:20,lat:0};
        lastDrag=Date.now();
        mdownPos={x:e.clientX,y:e.clientY};
        S.drag={on:true,pulse:true,x0:e.clientX,y0:e.clientY,lon0:S.pulseRot.lon,lat0:S.pulseRot.lat};
        cv.style.cursor='grabbing';
        return;
      }
    }
    return;
  }
  if(S.view>1) return;
  lastDrag=Date.now();
  mdownPos={x:e.clientX,y:e.clientY};
  S.drag={on:true,pulse:false,x0:e.clientX,y0:e.clientY,lon0:S.rot.lon,lat0:S.rot.lat};
});
window.addEventListener("mousemove",e=>{
  // Month scrubber drag
  if(SCR.drag){
    scrubToX(e.clientX);
    cv.style.cursor='ew-resize'; return;
  }
  // Timeline brush drag
  if(TL.drag){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const {bX,bW,yr0,yr1,ySpan}=S._tlBrush||{};
    if(bW){
      const dx=mx-TL.drag.x0;
      const dyrs=Math.round(dx/bW*ySpan);
      if(TL.drag.mode==='from'){
        setYearRange(TL.drag.from0+dyrs, TL.drag.to0);
      } else if(TL.drag.mode==='to'){
        setYearRange(TL.drag.from0, TL.drag.to0+dyrs);
      } else { // pan
        setYearRange(TL.drag.from0+dyrs, TL.drag.to0+dyrs);
      }
    }
    return;
  }
  if(S.drag?.on){
    const dx=e.clientX-S.drag.x0,dy=e.clientY-S.drag.y0;
    if(S.drag.pulse){
      if(!S.pulseRot) S.pulseRot={lon:20,lat:0};
      S.pulseRot.lon=S.drag.lon0-dx*.26;
      S.pulseRot.lat=Math.max(-88,Math.min(88,S.drag.lat0+dy*.26));
    }else{
      S.rot.lon=S.drag.lon0-dx*.26;
      S.rot.lat=Math.max(-88,Math.min(88,S.drag.lat0+dy*.26));
    }
    lastDrag=Date.now();
    render(); return;
  }
  // Cursor hints for scrubber / timeline brush
  if(S.view<=1){
    cv.style.cursor=scrubberHit(e.clientX,e.clientY)?'ew-resize':'grab';
  } else if(S.view===2&&S._pulseGeom){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const inF=Math.hypot(mx-S._pulseGeom.front.cx,my-S._pulseGeom.front.cy)<=S._pulseGeom.front.r+8;
    const inB=Math.hypot(mx-S._pulseGeom.back.cx,my-S._pulseGeom.back.cy)<=S._pulseGeom.back.r+8;
    cv.style.cursor=(inF||inB)?'grab':'default';
  } else if(S.view===3){
    const hit=tlBrushHit(e.clientX,e.clientY);
    cv.style.cursor=hit?'ew-resize':'default';
  }
  const c=hitTest(e.clientX,e.clientY);
  if(c!==S.hover||(c&&c.name!==S.hover?.name)){
    S.hover=c||null;
    if(c){showTT(c,e.clientX,e.clientY);if(S.view!==3)cv.style.cursor="pointer";}
    else{
      hideTT();
      if(S.view<=1) cv.style.cursor="grab";
    }
    if(S.view===0||S.view===1||S.view===2||S.view===4) render();
  } else if(c) showTT(c,e.clientX,e.clientY);
});
window.addEventListener("mouseup",e=>{
  if(SCR.drag){SCR.drag=false;cv.style.cursor='default';return;}
  if(TL.drag){TL.drag=null;cv.style.cursor='default';return;}
  if(!S.drag?.on){
    if(S.view>1){const c=hitTest(e.clientX,e.clientY);if(c) toggleCity(c.name);}
    S.drag={on:false}; return;
  }
  const moved=mdownPos?Math.hypot(e.clientX-mdownPos.x,e.clientY-mdownPos.y):99;
  S.drag={on:false};
  if(moved<6){const c=hitTest(e.clientX,e.clientY);if(c) toggleCity(c.name);}
});
cv.addEventListener("mouseleave",()=>{hideTT();S.hover=null;if(TL.drag)TL.drag=null;SCR.drag=false;S._v2cross=null;});
cv.addEventListener("dblclick",e=>{
  if(tlBrushHit(e.clientX,e.clientY)){
    setYearRange(YEARS[0],YEARS[YEARS.length-1]);
  }
});

// ── CITY MANAGEMENT ───────────────────────────────────────────────
function toggleCity(name){
  if(S.sel.includes(name)) removeCity(name); else addCity(name);
}
function addCity(name){
  if(S.sel.includes(name)) return;
  S.sel.push(name); S.colors[name]=PAL[S.sel.length-1];
  rebuildChips(); updateMonthsHint();
}
function removeCity(name){
  S.sel=S.sel.filter(n=>n!==name); delete S.colors[name];
  S.sel.forEach((n,i)=>{S.colors[n]=PAL[i];});
  rebuildChips(); updateMonthsHint();
}
function rebuildChips(){
  const el=document.getElementById("chips"); el.innerHTML="";
  S.sel.forEach(name=>{
    const col=S.colors[name];
    const div=document.createElement("div");
    div.className="chip"; div.style.color=col; div.style.borderColor=col+"44";
    div.innerHTML=`<div style="width:6px;height:6px;border-radius:50%;background:${col};flex-shrink:0"></div>`+
      `<span>${name.length>13?name.slice(0,12)+"\u2026":name}</span>`+
      `<span class="chip-x" data-n="${name}">\u00d7</span>`;
    div.querySelector(".chip-x").addEventListener("click",e=>{e.stopPropagation();removeCity(name);render();});
    el.appendChild(div);
  });
  // Update count badge
  const cnt=document.getElementById("sel-count");
  if(cnt) cnt.textContent=S.sel.length?`${S.sel.length} selected`:``;
  buildCityList(document.getElementById("srch").value);
  render();
}
function buildCityList(q=""){
  const el=document.getElementById("city-list"); if(!el) return;
  const lq=q.toLowerCase();
  const list=CITY_DATA.filter(c=>!lq||c.name.toLowerCase().includes(lq)||c.country.toLowerCase().includes(lq));
  if(!list.length){el.innerHTML=`<div class="city-list-empty">No cities match</div>`;return;}
  // Sort: selected first, then Ahn-enriched (have co2 data), then alphabetical
  list.sort((a,b)=>{
    const as=S.sel.includes(a.name),bs=S.sel.includes(b.name);
    if(as&&!bs) return -1; if(bs&&!as) return 1;
    if(a.co2!=null&&b.co2==null) return -1; if(b.co2!=null&&a.co2==null) return 1;
    return a.name.localeCompare(b.name);
  });
  el.innerHTML="";
  list.forEach(c=>{
    const isSel=S.sel.includes(c.name);
    const col=S.colors[c.name]||null;
    const div=document.createElement("div");
    div.className="city-item"+(isSel?" sel":"");
    // Badge: show CO2 emissions for Ahn cities, or "OCO" for CSV-only
    const badge=c.co2!=null
      ?`<div class="ci-co2">${c.co2.toFixed(0)}</div>`
      :`<div class="ci-co2" style="color:#2a3a3a;font-size:8px">OCO</div>`;
    div.innerHTML=
      `<div class="ci-dot" style="${isSel?`background:${col};border-color:${col};box-shadow:0 0 4px ${col}44`:``}"></div>`+
      `<div class="ci-text">`+
        `<div class="ci-name" style="${isSel?`color:${col}`:``}">${c.name}</div>`+
        `<div class="ci-country">${c.country.replace("Kingdom of ","").replace("French Republic","France")}</div>`+
      `</div>`+badge;
    div.addEventListener("click",()=>{toggleCity(c.name);});
    el.appendChild(div);
  });
}

// ── CITY SEARCH FILTER ────────────────────────────────────────────
const srch=document.getElementById("srch");
srch.addEventListener("input",()=>buildCityList(srch.value));

// ── TIME RANGE ────────────────────────────────────────────────────
function buildYearSelects(){
  const fy=document.getElementById("yfrom"), ty=document.getElementById("yto");
  YEARS.forEach(y=>{
    const of=document.createElement("option"),ot=document.createElement("option");
    of.value=ot.value=y; of.textContent=ot.textContent=y;
    fy.appendChild(of); ty.appendChild(ot);
  });
  fy.value=S.yfrom; ty.value=S.yto;
  fy.addEventListener("change",()=>{
    S.yfrom=+fy.value;
    if(S.yto<S.yfrom){S.yto=S.yfrom;ty.value=S.yto;}
    updateMonthsHint(); render();
  });
  ty.addEventListener("change",()=>{
    S.yto=+ty.value;
    if(S.yfrom>S.yto){S.yfrom=S.yto;fy.value=S.yfrom;}
    updateMonthsHint(); render();
  });
}

// ── VIEW NAV ──────────────────────────────────────────────────────
function setView(v){
  v=Math.max(0,Math.min(5,v));
  // Timeline tab is merged into Pulse (view 2)
  if(v===3) v = (S.view<=2?4:2);
  if(v===S.view) return;
  cv.classList.add("fade");
  S.view=v; hideTT(); S.hover=null;
  updateOverlays();
  setTimeout(()=>{cv.classList.remove("fade");render();},100);
}
document.getElementById("np").addEventListener("click",()=>setView(S.view-1));
document.getElementById("nn").addEventListener("click",()=>setView(S.view+1));
document.getElementById("gtog").addEventListener("click",()=>{S.flat=!S.flat;render();});

// Scatter axis controls
['sc-x','sc-y','sc-sz','sc-col'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el) return;
  const key=id.replace('sc-','');
  const stateKey={x:'x',y:'y',sz:'sz',col:'col'}[key];
  el.value=S.scat[stateKey];
  el.addEventListener('change',()=>{S.scat[stateKey]=el.value;render();});
});
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){
    const next=S.view===2?4:S.view+1;
    setView(next);
  }
  if(e.key==="ArrowLeft"){
    const prev=S.view===4?2:S.view-1;
    setView(prev);
  }
});

function buildDots(){
  const el=document.getElementById("dots"); el.innerHTML="";
  [0,1,2,4,5].forEach(i=>{
    const d=document.createElement("div");
    d.dataset.v=i;
    d.className="dot"+(i===0?" on":""); d.title=VIEWS[i];
    d.addEventListener("click",()=>setView(i)); el.appendChild(d);
  });
}
function buildVGrid(){
  const el=document.getElementById("vgrid"); el.innerHTML="";
  VIEWS.forEach((nm,i)=>{
    if(i===3) return; // Timeline merged into Pulse
    const b=document.createElement("button");
    b.className="vb"+(i===0?" on":""); b.dataset.v=i; b.textContent=nm;
    b.addEventListener("click",()=>setView(i)); el.appendChild(b);
  });
}

// ── INIT ──────────────────────────────────────────────────────────
DEFAULT_SEL.forEach(n=>addCity(n));
buildDots(); buildVGrid(); buildYearSelects();
buildCityList();
updateMonthsHint();
setupSidebarResize();
resize();
window.addEventListener("resize",resize);
requestAnimationFrame(animTick);

// Land data embedded — no CDN needed
document.getElementById("ldg").style.display="none";
render();
</script>
</body>
